let currentSection = 'overview';

let postFilter = 'all';

function switchSection(section, navBtn){
    currentSection = section;

    // Desktop nav highlight
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    const btn = navBtn || document.querySelector(`.nav-item[data-section="${section}"]`);
    if(btn) btn.classList.add('active');

    render();
}

function render(){
    const area = document.getElementById('contentArea');
    switch(currentSection){
        case 'overview': renderOverview(area); break;
        case 'users': renderUsers(area); break;
        case 'posts': renderPosts(area); break;
        case 'reports': renderReports(area); break;
        case 'ads': renderAds(area); break;
        case 'analytics': renderAnalytics(area); break;
    }
}

function verifyUser(uid){const u=USERS.find(x=>x.id===uid);if(u){u.verified=true;renderUsers(document.getElementById('contentArea'));showToast('تم توثيق '+u.name,'success')}}

    <div class="tab-pills mb-4 anim-fade">
        <button class="tab-pill ${reportFilter==='all'?'active':''}" onclick="reportFilter='all';renderReports(document.getElementById('contentArea'))">الكل</button>
        <button class="tab-pill ${reportFilter==='pending'?'active':''}" onclick="reportFilter='pending';renderReports(document.getElementById('contentArea'))">معلق <span class="text-red-400">(${REPORTS.filter(r=>r.status==='pending').length})</span></button>
        <button class="tab-pill ${reportFilter==='resolved'?'active':''}" onclick="reportFilter='resolved';renderReports(document.getElementById('contentArea'))">محلول</button>
    </div>

    <div class="space-y-3">
        ${filtered.map((r,idx)=>{
            const delay=Math.min(idx*.06,.4);
            return `
            <div class="bg-[#1a1a1a] rounded-2xl p-4 border border-[#594138]/15 anim-fadeUp" style="animation-delay:${delay}s;opacity:0;${r.status==='resolved'?'opacity:.6':''}">
                <div class="flex items-start gap-3">
                    <div class="w-10 h-10 rounded-xl flex items-center justify-center shrink-0" style="background:${sevColors[r.severity]}15">
                        <span class="material-symbols-outlined text-[20px]" style="color:${sevColors[r.severity]}">${typeIcons[r.type]}</span>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 flex-wrap mb-1">
                            <span class="font-bold text-sm">${typeLabels[r.type]}</span>
                            <span class="text-[10px] font-bold px-2 py-0.5 rounded-full" style="background:${sevColors[r.severity]}15;color:${sevColors[r.severity]}">${sevLabels[r.severity]}</span>
                            <span class="status-badge ${r.status==='pending'?'status-pending':'status-resolved'}">${r.status==='pending'?'معلق':'محلول'}</span>
                            <span class="text-[10px] text-[#7a7570]">${formatTimeAgo(r.time)}</span>
                        </div>
                        <p class="text-sm text-[#e1bfb3] mb-2">${esc(r.reason)}</p>
                        <div class="flex items-center gap-2 text-[10px] text-[#7a7570]">
                            <span>المُبلّغ: <strong class="text-[#e1bfb3]">${esc(r.reporter.name)}</strong></span>
                            <span>•</span>
                            <span>ضد: <strong class="text-red-400">${esc(r.target.name)}</strong></span>
                        </div>
                    </div>
                    ${r.status==='pending'?`
                    <div class="flex flex-col gap-1 shrink-0">
                        <button class="btn-sm accept" onclick="resolveReport('${r.id}')"><span class="material-symbols-outlined text-[12px]">check</span>حل</button>
                        <button class="btn-sm reject" onclick="warnUser('${r.target.id}')"><span class="material-symbols-outlined text-[12px]">warning</span>تحذير</button>
                        <button class="btn-sm reject" onclick="banReportedUser('${r.target.id}','${r.id}')"><span class="material-symbols-outlined text-[12px]">block</span>حظر</button>
                    </div>`:`<span class="text-[10px] text-green-400 font-bold shrink-0">✓ تم الحل</span>`}
                </div>
            </div>`;
        }).join('')}
    </div>`;
}

function resolveReport(rid){const r=REPORTS.find(x=>x.id===rid);if(r){r.status='resolved';renderReports(document.getElementById('contentArea'));showToast('تم حل البلاغ','success')}}
function warnUser(uid){showToast('تم إرسال تحذير للمستخدم','info')}
function banReportedUser(uid,rid){const u=USERS.find(x=>x.id===uid);if(u){u.status='disabled'}resolveReport(rid);showToast('تم حظر المستخدم','error')}

// ═══════════════════════════════════════════
// ADS MANAGEMENT
// ═══════════════════════════════════════════
function renderAds(area){
    area.innerHTML = `
    <div class="flex items-center justify-between mb-6 anim-fade">
        <div>
            <h1 class="text-xl font-extrabold">إدارة الإعلانات</h1>
            <p class="text-sm text-[#7a7570] mt-1">${ADS.length} إعلان</p>
        </div>
        <button class="btn-orange text-xs" onclick="openAdModal()"><span class="material-symbols-outlined text-[16px]">add</span>إعلان جديد</button>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-6">
        <div class="stat-card"><div class="stat-icon" style="background:rgba(242,101,34,.12)"><span class="material-symbols-outlined text-[#f26522] text-[22px]" style="font-variation-settings:'FILL' 1">campaign</span></div><p class="text-xl font-extrabold text-[#f26522]">${ADS.length}</p><p class="text-xs text-[#7a7570]">إجمالي الإعلانات</p></div>
        <div class="stat-card"><div class="stat-icon" style="background:rgba(59,130,246,.12)"><span class="material-symbols-outlined text-blue-400 text-[22px]" style="font-variation-settings:'FILL' 1">visibility</span></p><p class="text-xl font-extrabold text-blue-400">${formatNum(ADS.reduce((s,a)=>s+a.impressions,0))}</p><p class="text-xs text-[#7a7570]">إجمالي المشاهدات</p></div>
        <div class="stat-card"><div class="stat-icon" style="background:rgba(34,197,94,.12)"><span class="material-symbols-outlined text-green-400 text-[22px]" style="font-variation-settings:'FILL' 1">payments</span></div><p class="text-xl font-extrabold text-green-400">${formatNum(ADS.reduce((s,a)=>s+a.spent,0))} ر.س</p><p class="text-xs text-[#7a7570]">إجمالي الإنفاق</p></div>
    </div>

    <div class="space-y-3">
        ${ADS.map((ad,idx)=>{
            const delay=Math.min(idx*.08,.4);
            const pct=Math.round(ad.spent/ad.budget*100);
            return `
            <div class="bg-[#1a1a1a] rounded-2xl p-5 border border-[#594138]/15 anim-fadeUp" style="animation-delay:${delay}s;opacity:0">
                <div class="flex items-start justify-between mb-3">
                    <div>
                        <h3 class="font-bold text-sm">${esc(ad.title)}</h3>
                        <p class="text-xs text-[#7a7570] mt-0.5">${esc(ad.advertiser)}</p>
                    </div>
                    <span class="status-badge ${ad.status==='active'?'status-active':'status-disabled'}">${ad.status==='active'?'نشط':'مكتمل'}</span>
                </div>
                <div class="grid grid-cols-4 gap-3 mb-3">
                    <div class="text-center"><p class="text-sm font-extrabold text-blue-400">${formatNum(ad.impressions)}</p><p class="text-[9px] text-[#7a7570]">مشاهدات</p></div>
                    <div class="text-center"><p class="text-sm font-extrabold text-green-400">${formatNum(ad.clicks)}</p><p class="text-[9px] text-[#7a7570]">نقرات</p></div>
                    <div class="text-center"><p class="text-sm font-extrabold text-purple-400">${ad.ctr}%</p><p class="text-[9px] text-[#7a7570]">CTR</p></div>
                    <div class="text-center"><p class="text-sm font-extrabold text-[#f26522]">${formatNum(ad.spent)}/${formatNum(ad.budget)}</p><p class="text-[9px] text-[#7a7570]">الميزانية</p></div>
                </div>
                <div class="h-2 bg-[#353534] rounded-full overflow-hidden mb-3"><div class="h-full rounded-full transition-all" style="width:${pct}%;background:${pct>90?'#ef4444':'#f26522'}"></div></div>
                <div class="flex gap-2">
                    <button class="btn-sm edit" onclick="showToast('تعديل الإعلان','info')"><span class="material-symbols-outlined text-[12px]">edit</span>تعديل</button>
                    <button class="btn-sm reject" onclick="deleteAd('${ad.id}')"><span class="material-symbols-outlined text-[12px]">delete</span>حذف</button>
                </div>
            </div>`;
        }).join('')}
    </div>`;
}

function deleteAd(aid){const idx=ADS.findIndex(x=>x.id===aid);if(idx>=0){ADS.splice(idx,1);renderAds(document.getElementById('contentArea'));showToast('تم حذف الإعلان','success')}}
function openAdModal(){
    const modal=document.getElementById('modal');
    document.getElementById('modalContent').innerHTML=`
    <div class="p-5 border-b border-[#594138]/20 flex items-center justify-between">
        <h3 class="text-lg font-extrabold text-[#f26522] flex items-center gap-2"><span class="material-symbols-outlined text-[22px]">campaign</span>إعلان جديد</h3>
        <button onclick="closeModal()" class="p-2 rounded-full hover:bg-white/5"><span class="material-symbols-outlined text-[#7a7570]">close</span></button>
    </div>
    <div class="p-5 space-y-4">
        <div><label class="text-sm font-semibold text-[#e1bfb3] mb-2 block">عنوان الإعلان</label><input type="text" id="adTitle" class="input-field" placeholder="مثال: دورة تدريبية"/></div>
        <div><label class="text-sm font-semibold text-[#e1bfb3] mb-2 block">المعلن</label><input type="text" id="adAdvertiser" class="input-field" placeholder="اسم الشركة أو المعلن"/></div>
        <div class="grid grid-cols-2 gap-3">
            <div><label class="text-sm font-semibold text-[#e1bfb3] mb-2 block">الميزانية (ر.س)</label><input type="number" id="adBudget" class="input-field" placeholder="5000"/></div>
            <div><label class="text-sm font-semibold text-[#e1bfb3] mb-2 block">المدة (أيام)</label><input type="number" id="adDuration" class="input-field" placeholder="30"/></div>
        </div>
        <button onclick="createAd()" class="btn-orange w-full justify-center"><span class="material-symbols-outlined text-[16px]">add</span>إنشاء الإعلان</button>
    </div>`;
    modal.classList.add('active');
}

function createAd(){
    const title=document.getElementById('adTitle').value.trim();
    if(!title){showToast('أدخل عنوان الإعلان','error');return}
    ADS.push({id:genId(),title,advertiser:document.getElementById('adAdvertiser').value.trim()||'معلن',image:null,budget:parseInt(document.getElementById('adBudget').value)||5000,spent:0,impressions:0,clicks:0,ctr:0,status:'active',startDate:new Date().toISOString(),endDate:ago(-30*1440)});
    closeModal();renderAds(document.getElementById('contentArea'));showToast('تم إنشاء الإعلان','success');
}

// ═══════════════════════════════════════════
// FULL ANALYTICS
// ═══════════════════════════════════════════
function renderAnalytics(area){
    const months=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
    const maxG=Math.max(...ANALYTICS.userGrowth);
    const maxD=Math.max(...ANALYTICS.dailyPosts);
    const maxE=Math.max(...ANALYTICS.engagement);

    area.innerHTML=`
    <div class="flex items-center justify-between mb-6 anim-fade">
        <div><h1 class="text-xl font-extrabold">الإحصائيات التفصيلية</h1><p class="text-sm text-[#7a7570] mt-1">تحليل شامل لأداء المنصة</p></div>
    </div>

    <!-- KPI Cards -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
        <div class="stat-card anim-fadeUp" style="animation-delay:0s"><p class="text-2xl font-extrabold text-[#f26522]">${formatNum(ANALYTICS.totalUsers)}</p><p class="text-xs text-[#7a7570]">إجمالي المستخدمين</p><p class="text-[10px] text-green-400 mt-1">+${Math.round((ANALYTICS.userGrowth[11]-ANALYTICS.userGrowth[10])/ANALYTICS.userGrowth[10]*100)}% هذا الشهر</p></div>
        <div class="stat-card anim-fadeUp" style="animation-delay:.1s"><p class="text-2xl font-extrabold text-blue-400">${formatNum(ANALYTICS.totalPosts)}</p><p class="text-xs text-[#7a7570]">إجمالي المنشورات</p><p class="text-[10px] text-blue-400 mt-1">${ANALYTICS.postsThisWeek} هذا الأسبوع</p></div>
        <div class="stat-card anim-fadeUp" style="animation-delay:.2s"><p class="text-2xl font-extrabold text-green-400">${formatNum(ANALYTICS.activeUsers)}</p><p class="text-xs text-[#7a7570]">مستخدم نشط</p><p class="text-[10px] text-green-400 mt-1">${Math.round(ANALYTICS.activeUsers/ANALYTICS.totalUsers*100)}% معدل النشاط</p></div>
        <div class="stat-card anim-fadeUp" style="animation-delay:.3s"><p class="text-2xl font-extrabold text-purple-400">${(ANALYTICS.engagement[ANALYTICS.engagement.length-1]).toFixed(1)}%</p><p class="text-xs text-[#7a7570]">معدل التفاعل</p><p class="text-[10px] text-green-400 mt-1">▲ تحسن مستمر</p></div>
    </div>

    <!-- User Growth (detailed) -->
    <div class="bg-[#1a1a1a] rounded-2xl p-5 border border-[#594138]/15 mb-6 anim-fadeUp" style="animation-delay:.4s">
        <h3 class="font-bold text-sm mb-4">نمو المستخدمين الشهري</h3>
        <div class="bar-chart" style="height:150px">
            ${ANALYTICS.userGrowth.map((v,i)=>{const h=Math.round((v/maxG)*140);return `<div class="bar-col"><div class="bar" style="height:${h}px;background:linear-gradient(to top,rgba(242,101,34,.4),rgba(242,101,34,.8))"></div><span class="bar-label">${months[i].substring(0,3)}</span></div>`}).join('')}
        </div>
        <div class="flex justify-between mt-3 text-[10px] text-[#7a7570]"><span>يناير: ${ANALYTICS.userGrowth[0]}</span><span>ديسمبر: ${ANALYTICS.userGrowth[11]}</span></div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
        <!-- Daily Posts (detailed) -->
        <div class="bg-[#1a1a1a] rounded-2xl p-5 border border-[#594138]/15 anim-fadeUp" style="animation-delay:.5s">
            <h3 class="font-bold text-sm mb-4">المنشورات — آخر 16 يوم</h3>
            <div class="bar-chart" style="height:130px">
                ${ANALYTICS.dailyPosts.map((v,i)=>{const h=Math.round((v/maxD)*120);return `<div class="bar-col"><div class="bar" style="height:${h}px;background:linear-gradient(to top,rgba(59,130,246,.4),rgba(59,130,246,.8))"></div><span class="bar-label">${i+1}</span></div>`}).join('')}
            </div>
        </div>

        <!-- Engagement Trend -->
        <div class="bg-[#1a1a1a] rounded-2xl p-5 border border-[#594138]/15 anim-fadeUp" style="animation-delay:.6s">
            <h3 class="font-bold text-sm mb-4">معدل التفاعل الشهري</h3>
            <div class="bar-chart" style="height:130px">
                ${ANALYTICS.engagement.map((v,i)=>{const h=Math.round((v/maxE)*120);return `<div class="bar-col"><div class="bar" style="height:${h}px;background:linear-gradient(to top,rgba(34,197,94,.4),rgba(34,197,94,.8))"></div><span class="bar-label">${months[i].substring(0,3)}</span></div>`}).join('')}
            </div>
        </div>
    </div>

    <!-- Category + Peak Hours -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="bg-[#1a1a1a] rounded-2xl p-5 border border-[#594138]/15 anim-fadeUp" style="animation-delay:.7s">
            <h3 class="font-bold text-sm mb-4">توزيع الأقسام</h3>
            ${ANALYTICS.topCategories.map(c=>`<div class="mb-3"><div class="flex items-center justify-between mb-1"><span class="text-xs">${c.name}</span><span class="text-xs font-bold" style="color:${c.color}">${c.pct}%</span></div><div class="h-2 bg-[#353534] rounded-full overflow-hidden"><div class="h-full rounded-full" style="width:${c.pct}%;background:${c.color};animation:slideBar .8s ease forwards;--w:${c.pct}%"></div></div></div>`).join('')}
        </div>

        <div class="bg-[#1a1a1a] rounded-2xl p-5 border border-[#594138]/15 anim-fadeUp" style="animation-delay:.8s">
            <h3 class="font-bold text-sm mb-4">ساعات الذروة</h3>
            <div class="bar-chart" style="height:120px">
                ${ANALYTICS.peakHours.map(h=>`<div class="bar-col"><div class="bar" style="height:${h.v}px;background:${h.v>80?'rgba(239,68,68,.7)':h.v>50?'rgba(234,179,8,.7)':'rgba(89,65,56,.4)'}"></div><span class="bar-label">${h.h}</span></div>`).join('')}
            </div>
            <p class="text-[10px] text-[#7a7570] mt-2 text-center">أعلى نشاط: 10 مساءً</p>
        </div>
    </div>`;
}

// ═══════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════
function closeModal(){document.getElementById('modal').classList.remove('active')}

// ═══════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════
function showToast(msg,type='info'){
    const t=document.getElementById('toastEl');
    const icons={success:'check_circle',error:'error',info:'info'};
    t.className='toast '+type;
    t.innerHTML=`<span class="material-symbols-outlined text-[20px]">${icons[type]}</span> ${msg}`;
    setTimeout(()=>t.classList.add('show'),10);
    setTimeout(()=>t.classList.remove('show'),3500);
}
