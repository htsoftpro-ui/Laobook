<!DOCTYPE html>
<html class="dark" lang="ar" dir="rtl">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>لو بوك | الرسائل</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        *{box-sizing:border-box}
        body{font-family:'Tajawal',sans-serif;height:100dvh;overflow:hidden;background:#0a0a0a;color:#e5e2e1}
        .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;transition:all .2s ease}
        .filled{font-variation-settings:'FILL' 1;color:#f26522!important}

        .app-bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 20% 0%,rgba(242,101,34,.06) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(242,101,34,.04) 0%,transparent 50%),#0a0a0a}
        .app-bg::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:.3;pointer-events:none}

        .glass{background:rgba(32,31,31,.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}

        @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        @keyframes slideInR{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
        @keyframes slideInL{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}
        @keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
        @keyframes typing{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}
        @keyframes ringPulse{0%{box-shadow:0 0 0 0 rgba(34,197,94,.4)}70%{box-shadow:0 0 0 15px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}
        @keyframes callRing{0%,100%{transform:rotate(0)}10%{transform:rotate(15deg)}20%{transform:rotate(-15deg)}30%{transform:rotate(10deg)}40%{transform:rotate(-10deg)}50%{transform:rotate(0)}}
        @keyframes waveform{0%,100%{height:4px}50%{height:20px}}

        .anim-fade{animation:fadeIn .3s ease}
        .anim-slideR{animation:slideInR .3s ease}
        .anim-slideL{animation:slideInL .3s ease}

        /* ═══════ Layout ═══════ */
        .app-layout{display:flex;height:100dvh;position:relative;z-index:1}
        .sidebar{width:380px;border-left:1px solid rgba(89,65,56,.2);display:flex;flex-direction:column;flex-shrink:0}
        .chat-area{flex:1;display:flex;flex-direction:column;position:relative}

        /* ═══════ Chat List ═══════ */
        .chat-item{display:flex;gap:12px;padding:14px 16px;cursor:pointer;transition:all .2s;border-bottom:1px solid rgba(89,65,56,.08);position:relative}
        .chat-item:hover{background:rgba(242,101,34,.04)}
        .chat-item.active{background:rgba(242,101,34,.08);border-right:3px solid #f26522}
        .chat-avatar{width:48px;height:48px;border-radius:50%;object-fit:cover;flex-shrink:0}
        .group-avatar{width:48px;height:48px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px}
        .unread-badge{min-width:20px;height:20px;background:#f26522;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:white;padding:0 6px}

        .search-box{position:relative}
        .search-box input{width:100%;background:rgba(42,42,42,.5);border:1px solid rgba(89,65,56,.25);border-radius:12px;padding:10px 16px 10px 40px;color:#e5e2e1;font-size:14px;outline:none;transition:all .3s;font-family:'Tajawal',sans-serif}
        .search-box input:focus{border-color:#f26522;box-shadow:0 0 0 3px rgba(242,101,34,.1)}
        .search-box input::placeholder{color:#7a7570}

        /* ═══════ Message Bubbles ═══════ */
        .msg-bubble{max-width:75%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.6;position:relative;word-wrap:break-word}
        .msg-sent{background:linear-gradient(135deg,#f26522,#e85d1c);color:white;border-radius:18px 4px 18px 18px;align-self:flex-start}
        .msg-received{background:rgba(42,42,42,.7);border:1px solid rgba(89,65,56,.15);color:#e5e2e1;border-radius:4px 18px 18px 18px;align-self:flex-end}
        .msg-time{font-size:10px;margin-top:4px;display:flex;align-items:center;gap:4px}
        .msg-sent .msg-time{color:rgba(255,255,255,.6);justify-content:flex-start}
        .msg-received .msg-time{color:#7a7570;justify-content:flex-end}

        .msg-image{border-radius:12px;overflow:hidden;max-width:280px;cursor:pointer}
        .msg-image img{width:100%;display:block}
        .msg-file{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:12px;background:rgba(0,0,0,.2);cursor:pointer;transition:background .2s}
        .msg-file:hover{background:rgba(0,0,0,.3)}
        .msg-audio{display:flex;align-items:center;gap:10px;min-width:200px}
        .msg-audio .waveform{display:flex;align-items:center;gap:2px;height:24px}
        .msg-audio .waveform span{width:3px;background:currentColor;border-radius:2px;animation:waveform 1.2s ease-in-out infinite}
        .msg-video{border-radius:12px;overflow:hidden;max-width:280px;position:relative;cursor:pointer}
        .msg-video video{width:100%;display:block;max-height:200px;object-fit:cover}
        .msg-video .play-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.3)}

        /* ═══════ Typing Indicator ═══════ */
        .typing-dots{display:flex;gap:4px;align-items:center;padding:8px 14px}
        .typing-dots span{width:7px;height:7px;background:#7a7570;border-radius:50%;animation:typing 1.4s ease-in-out infinite}
        .typing-dots span:nth-child(2){animation-delay:.2s}
        .typing-dots span:nth-child(3){animation-delay:.4s}

        /* ═══════ Read Status ═══════ */
        .status-sent{color:rgba(255,255,255,.5)}
        .status-delivered{color:rgba(255,255,255,.5)}
        .status-read{color:#60a5fa}

        /* ═══════ Voice Recording ═══════ */
        .recording-bar{display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);border-radius:14px;animation:fadeIn .3s ease}
        .rec-dot{width:10px;height:10px;background:#ef4444;border-radius:50%;animation:pulse 1s infinite}

        /* ═══════ Call Interface ═══════ */
        .call-overlay{position:fixed;inset:0;z-index:200;background:rgba(10,10,10,.95);display:none;flex-direction:column;align-items:center;justify-content:center}
        .call-overlay.active{display:flex}
        .call-avatar{width:120px;height:120px;border-radius:50%;object-fit:cover;margin-bottom:24px;animation:ringPulse 2s infinite}
        .call-timer{font-size:32px;font-weight:300;color:#e5e2e1;letter-spacing:4px;margin-bottom:8px;font-variant-numeric:tabular-nums}
        .call-status{color:#7a7570;margin-bottom:48px}
        .call-actions{display:flex;gap:24px}
        .call-btn{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;border:none}
        .call-btn:hover{transform:scale(1.1)}
        .call-btn.end-call{background:#ef4444}
        .call-btn.mute-call{background:rgba(255,255,255,.1)}
        .call-btn.mute-call.active{background:#f26522}
        .call-btn.speaker-call{background:rgba(255,255,255,.1)}
        .call-btn.speaker-call.active{background:#f26522}

        .video-call-grid{display:grid;grid-template-columns:1fr;gap:0;width:100%;height:100%;position:relative}
        .video-call-main{width:100%;height:100%;background:#111;position:relative;display:flex;align-items:center;justify-content:center}
        .video-call-self{position:absolute;bottom:80px;left:16px;width:120px;height:160px;border-radius:16px;background:#222;border:2px solid #f26522;overflow:hidden;z-index:10;display:flex;align-items:center;justify-content:center}

        /* ═══════ Modals ═══════ */
        .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:100;display:none;align-items:center;justify-content:center;padding:16px}
        .modal-bg.active{display:flex;animation:fadeIn .3s ease}
        .modal-box{background:#1a1a1a;border:1px solid rgba(89,65,56,.3);border-radius:20px;width:100%;max-width:480px;max-height:90dvh;overflow-y:auto;animation:fadeInUp .4s cubic-bezier(.4,0,.2,1)}

        /* ═══════ Inputs ═══════ */
        .input-field{background:rgba(42,42,42,.6);border:1px solid rgba(89,65,56,.4);border-radius:12px;padding:12px 16px;color:#e5e2e1;font-size:14px;width:100%;transition:all .3s;outline:none;font-family:'Tajawal',sans-serif}
        .input-field:focus{border-color:#f26522;box-shadow:0 0 0 3px rgba(242,101,34,.12)}
        .input-field::placeholder{color:#7a7570}

        /* ═══════ Buttons ═══════ */
        .btn-orange{background:linear-gradient(135deg,#f26522,#e85d1c);color:white;font-weight:700;font-size:14px;padding:10px 20px;border-radius:12px;border:none;cursor:pointer;transition:all .3s;font-family:'Tajawal',sans-serif;display:flex;align-items:center;gap:6px}
        .btn-orange:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(242,101,34,.3)}
        .btn-ghost{background:transparent;border:1px solid rgba(89,65,56,.3);color:#e5e2e1;font-weight:600;font-size:13px;padding:8px 16px;border-radius:10px;cursor:pointer;transition:all .3s;font-family:'Tajawal',sans-serif;display:flex;align-items:center;gap:4px}
        .btn-ghost:hover{border-color:#f26522;color:#f26522;background:rgba(242,101,34,.06)}

        /* ═══════ Toast ═══════ */
        .toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-100px);z-index:9999;padding:14px 28px;border-radius:14px;font-weight:700;font-size:14px;opacity:0;transition:all .5s cubic-bezier(.68,-.55,.265,1.55);display:flex;align-items:center;gap:10px;backdrop-filter:blur(12px);max-width:90vw}
        .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
        .toast.success{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:#4ade80}
        .toast.error{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#f87171}
        .toast.info{background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.3);color:#60a5fa}

        /* ═══════ Empty State ═══════ */
        .empty-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:#7a7570}

        /* ═══════ Scrollbar ═══════ */
        ::-webkit-scrollbar{width:4px;height:4px}
        ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:#474746;border-radius:4px}

        /* ═══════ Responsive ═══════ */
        @media(max-width:768px){
            .sidebar{width:100%;position:absolute;inset:0;z-index:10}
            .sidebar.hidden-mobile{display:none}
            .chat-area.hidden-mobile{display:none}
            .back-btn-mobile{display:flex!important}
        }
        @media(min-width:769px){
            .back-btn-mobile{display:none!important}
        }
    </style>
</head>
<body>
<div class="app-bg"></div>
<div id="toastEl" class="toast"></div>

<!-- ═══════════════════════════════════════════ -->
<!-- VOICE CALL OVERLAY -->
<!-- ═══════════════════════════════════════════ -->
<div id="voiceCallOverlay" class="call-overlay">
    <img id="callAvatarImg" src="" class="call-avatar"/>
    <h2 id="callName" class="text-2xl font-extrabold mb-1"></h2>
    <p id="callStatusText" class="call-status">جاري الاتصال...</p>
    <p id="callTimerText" class="call-timer hidden">00:00</p>
    <div class="call-actions">
        <button class="call-btn speaker-call" onclick="toggleSpeaker(this)" title="مكبر الصوت">
            <span class="material-symbols-outlined text-white text-[24px]">volume_up</span>
        </button>
        <button class="call-btn end-call" onclick="endCall()" title="إنهاء">
            <span class="material-symbols-outlined text-white text-[28px]">call_end</span>
        </button>
        <button class="call-btn mute-call" onclick="toggleMute(this)" title="كتم">
            <span class="material-symbols-outlined text-white text-[24px]">mic</span>
        </button>
    </div>
</div>

<!-- ═══════════════════════════════════════════ -->
<!-- VIDEO CALL OVERLAY -->
<!-- ═══════════════════════════════════════════ -->
<div id="videoCallOverlay" class="call-overlay" style="background:#000">
    <div class="video-call-grid">
        <div class="video-call-main">
            <div class="text-center">
                <img id="videoCallAvatar" src="" class="w-24 h-24 rounded-full object-cover mx-auto mb-4 opacity-50"/>
                <p id="videoCallName" class="text-lg font-bold"></p>
                <p id="videoCallStatus" class="text-sm text-[#7a7570]">جاري الاتصال...</p>
            </div>
            <div class="video-call-self">
                <span class="material-symbols-outlined text-[#7a7570] text-[32px]">videocam</span>
            </div>
        </div>
    </div>
    <div class="absolute bottom-8 left-1/2 -translate-x-1/2 flex gap-6 z-20">
        <button class="call-btn mute-call" onclick="toggleMute(this)"><span class="material-symbols-outlined text-white text-[24px]">mic</span></button>
        <button class="call-btn end-call" onclick="endCall()"><span class="material-symbols-outlined text-white text-[28px]">call_end</span></button>
        <button class="call-btn" style="background:rgba(255,255,255,.1)" onclick="toggleCameraFlip(this)"><span class="material-symbols-outlined text-white text-[24px]">flip_camera_android</span></button>
    </div>
</div>

<!-- ═══════════════════════════════════════════ -->
<!-- MAIN LAYOUT -->
<!-- ═══════════════════════════════════════════ -->
<div class="app-layout">

    <!-- ═══ SIDEBAR (Chat List) ═══ -->
    <aside class="sidebar glass" id="sidebar">
        <!-- Header -->
        <div class="p-4 border-b border-[#594138]/20">
            <div class="flex items-center justify-between mb-3">
                <h1 class="text-xl font-extrabold text-[#f26522]">الرسائل</h1>
                <div class="flex gap-1">
                    <button onclick="openNewGroupModal()" class="p-2 rounded-full hover:bg-white/5 text-[#7a7570] hover:text-[#f26522] transition-colors" title="إنشاء مجموعة">
                        <span class="material-symbols-outlined">group_add</span>
                    </button>
                    <button onclick="openNewChatModal()" class="p-2 rounded-full hover:bg-white/5 text-[#7a7570] hover:text-[#f26522] transition-colors" title="محادثة جديدة">
                        <span class="material-symbols-outlined">edit_square</span>
                    </button>
                </div>
            </div>
            <div class="search-box">
                <span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-[#7a7570] text-[20px]">search</span>
                <input type="text" id="chatSearch" placeholder="بحث في المحادثات..." oninput="filterChats(this.value)"/>
            </div>
        </div>

        <!-- Chat List -->
        <div id="chatList" class="flex-1 overflow-y-auto">
            <!-- Rendered dynamically -->
        </div>
    </aside>

    <!-- ═══ CHAT AREA ═══ -->
    <section class="chat-area" id="chatArea">
        <!-- Empty State (shown when no chat selected) -->
        <div id="emptyChatState" class="empty-chat">
            <span class="material-symbols-outlined text-6xl text-[#353534] mb-4">chat</span>
            <h2 class="text-xl font-bold text-[#353534] mb-2">مرحباً بك في الرسائل</h2>
            <p class="text-sm text-[#7a7570]">اختر محادثة من القائمة أو ابدأ محادثة جديدة</p>
        </div>

        <!-- Active Chat (hidden by default) -->
        <div id="activeChatView" class="hidden flex-col h-full">
            <!-- Chat Header -->
            <div class="glass border-b border-[#594138]/20 px-4 py-3 flex items-center gap-3 shrink-0">
                <button class="back-btn-mobile p-2 rounded-full hover:bg-white/5" onclick="goBackToList()">
                    <span class="material-symbols-outlined text-[#e1bfb3]">arrow_forward</span>
                </button>
                <img id="chatHeaderAvatar" src="" class="w-10 h-10 rounded-full object-cover"/>
                <div class="flex-1 min-w-0">
                    <h3 id="chatHeaderName" class="font-bold text-sm truncate"></h3>
                    <p id="chatHeaderStatus" class="text-[11px] text-[#7a7570]"></p>
                </div>
                <div class="flex gap-1">
                    <button onclick="startVoiceCall()" class="p-2 rounded-full hover:bg-white/5 text-[#7a7570] hover:text-green-400 transition-colors" title="مكالمة صوتية">
                        <span class="material-symbols-outlined">call</span>
                    </button>
                    <button onclick="startVideoCall()" class="p-2 rounded-full hover:bg-white/5 text-[#7a7570] hover:text-blue-400 transition-colors" title="مكالمة فيديو">
                        <span class="material-symbols-outlined">videocam</span>
                    </button>
                    <button onclick="openChatInfo()" class="p-2 rounded-full hover:bg-white/5 text-[#7a7570] hover:text-[#f26522] transition-colors" title="معلومات">
                        <span class="material-symbols-outlined">more_vert</span>
                    </button>
                </div>
            </div>

            <!-- Messages Container -->
            <div id="messagesContainer" class="flex-1 overflow-y-auto px-4 py-4 space-y-3">
                <!-- Rendered dynamically -->
            </div>

            <!-- Typing Indicator -->
            <div id="typingIndicator" class="hidden px-4 pb-2">
                <div class="flex items-center gap-2 text-[#7a7570] text-xs">
                    <div class="typing-dots"><span></span><span></span><span></span></div>
                    <span id="typingName"></span> يكتب...
                </div>
            </div>

            <!-- Recording Bar -->
            <div id="recordingBar" class="hidden px-4 pb-2">
                <div class="recording-bar">
                    <div class="rec-dot"></div>
                    <span class="text-red-400 font-bold text-sm" id="recordingTime">00:00</span>
                    <div class="flex-1"></div>
                    <button onclick="cancelRecording()" class="text-[#7a7570] hover:text-red-400 transition-colors px-3 py-1 text-sm font-semibold">إلغاء</button>
                    <button onclick="sendRecording()" class="text-[#f26522] hover:text-white transition-colors px-3 py-1 text-sm font-semibold flex items-center gap-1">
                        <span class="material-symbols-outlined text-[18px]">send</span> إرسال
                    </button>
                </div>
            </div>

            <!-- Image Preview Before Send -->
            <div id="imgSendPreview" class="hidden px-4 pb-2">
                <div class="relative inline-block">
                    <img id="imgSendThumb" class="h-20 rounded-xl border border-[#594138]/20"/>
                    <button onclick="cancelImageSend()" class="absolute -top-2 -left-2 w-6 h-6 bg-red-500 rounded-full flex items-center justify-center"><span class="material-symbols-outlined text-white text-[14px]">close</span></button>
                </div>
            </div>

            <!-- Composer -->
            <div id="chatComposer" class="px-4 pb-4 pt-2 border-t border-[#594138]/10 shrink-0">
                <div class="flex items-end gap-2">
                    <div class="flex gap-1 shrink-0">
                        <button onclick="document.getElementById('msgFileInput').click()" class="p-2 rounded-full hover:bg-white/5 text-[#7a7570] hover:text-[#f26522] transition-colors" title="إرفاق">
                            <span class="material-symbols-outlined text-[22px]">attach_file</span>
                        </button>
                        <input type="file" id="msgFileInput" class="hidden" onchange="handleFileAttach(this)"/>
                        <button onclick="document.getElementById('msgImgInput').click()" class="p-2 rounded-full hover:bg-white/5 text-[#7a7570] hover:text-[#f26522] transition-colors" title="صورة">
                            <span class="material-symbols-outlined text-[22px]">image</span>
                        </button>
                        <input type="file" id="msgImgInput" accept="image/*" class="hidden" onchange="handleImageAttach(this)"/>
                    </div>
                    <div class="flex-1 relative">
                        <input type="text" id="msgInput" class="w-full bg-[#1a1a1a] border border-[#594138]/20 rounded-2xl px-4 py-3 text-sm text-[#e5e2e1] outline-none focus:border-[#f26522]/40 transition-colors font-['Tajawal']" placeholder="اكتب رسالة..." onkeydown="handleMsgKeydown(event)" oninput="handleTyping()"/>
                    </div>
                    <button id="sendBtn" onclick="sendMessage()" class="w-11 h-11 bg-[#f26522] rounded-full flex items-center justify-center shrink-0 hover:scale-105 active:scale-95 transition-transform">
                        <span class="material-symbols-outlined text-white text-[20px]">send</span>
                    </button>
                    <button id="recordBtn" onmousedown="startRecording()" onmouseup="stopRecording()" ontouchstart="startRecording()" ontouchend="stopRecording()" class="w-11 h-11 bg-[#1a1a1a] border border-[#594138]/20 rounded-full flex items-center justify-center shrink-0 hover:border-[#f26522]/40 transition-colors" title="تسجيل صوتي">
                        <span class="material-symbols-outlined text-[#7a7570] text-[20px]">mic</span>
                    </button>
                </div>
            </div>
        </div>
    </section>
</div>

<!-- ═══════════════════════════════════════════ -->
<!-- NEW CHAT MODAL -->
<!-- ═══════════════════════════════════════════ -->
<div id="newChatModal" class="modal-bg" onclick="if(event.target===this)this.classList.remove('active')">
    <div class="modal-box">
        <div class="flex items-center justify-between p-5 border-b border-[#594138]/20">
            <h3 class="text-lg font-extrabold text-[#f26522]">محادثة جديدة</h3>

// ═══════════════════════════════════════════
// RENDER CHAT LIST
// ═══════════════════════════════════════════
function renderChatList(filter=''){
    const container=document.getElementById('chatList');
    const filtered=chats.filter(c=>{
        const name=c.type==='group'?c.groupName:c.peer.name;
        return name.toLowerCase().includes(filter.toLowerCase());
    });

    // Sort by last message time
    filtered.sort((a,b)=>{
        const tA=a.messages.length?new Date(a.messages[a.messages.length-1].time):0;
        const tB=b.messages.length?new Date(b.messages[b.messages.length-1].time):0;
        return tB-tA;
    });

    container.innerHTML=filtered.map(chat=>{
        const lastMsg=chat.messages[chat.messages.length-1];
        const name=chat.type==='group'?chat.groupName:chat.peer.name;
        const avatar=chat.type==='group'?null:chat.peer.avatar;
        const isActive=chat.id===activeChatId;
        const online=chat.type==='private'&&chat.peer.online;

        let lastMsgText='';
        let lastMsgTime='';
        if(lastMsg){
            lastMsgTime=formatDate(lastMsg.time)+' '+formatTime(lastMsg.time);
            switch(lastMsg.type){
                case 'text': lastMsgText=lastMsg.text.substring(0,50); break;
                case 'image': lastMsgText='📷 صورة'; break;
                case 'video': lastMsgText='🎥 فيديو'; break;
                case 'file': lastMsgText='📎 '+lastMsg.fileName; break;
                case 'audio': lastMsgText='🎤 رسالة صوتية'; break;
            }
            if(lastMsg.sender==='me') lastMsgText='أنت: '+lastMsgText;
        }

        return `
        <div class="chat-item ${isActive?'active':''}" onclick="openChat('${chat.id}')">
            ${avatar?`
                <div class="relative">
                    <img src="${avatar}" class="chat-avatar"/>
                    ${online?'<div class="absolute bottom-0 left-0 w-3 h-3 bg-green-400 rounded-full border-2 border-[#1a1a1a]"></div>':''}
                </div>
            `:`
                <div class="group-avatar" style="background:${chat.groupColor||'#f26522'}20;color:${chat.groupColor||'#f26522'}">
                    <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1">group</span>
                </div>
            `}
            <div class="flex-1 min-w-0">
                <div class="flex items-center justify-between">
                    <h4 class="font-bold text-sm truncate">${esc(name)}</h4>
                    <span class="text-[10px] text-[#7a7570] shrink-0">${lastMsgTime}</span>
                </div>
                <div class="flex items-center justify-between mt-1">
                    <p class="text-xs text-[#7a7570] truncate flex-1">${esc(lastMsgText)}</p>
                    ${chat.unread>0?`<div class="unread-badge shrink-0 mr-2">${chat.unread}</div>`:''}
                </div>
                ${chat.typing?`<p class="text-xs text-[#f26522] mt-1 animate-pulse">يكتب...</p>`:''}
            </div>
        </div>`;
    }).join('');

    if(filtered.length===0){
        container.innerHTML=`
            <div class="text-center py-12 text-[#7a7570]">
                <span class="material-symbols-outlined text-4xl mb-2 block">search_off</span>
                <p class="text-sm">لا توجد محادثات</p>
            </div>`;
    }
}

// ═══════════════════════════════════════════
// OPEN CHAT
// ═══════════════════════════════════════════
function openChat(chatId){
    activeChatId=chatId;
    const chat=chats.find(c=>c.id===chatId);
    if(!chat) return;

    // Mark as read
    chat.unread=0;
    chat.messages.forEach(m=>{if(m.sender!=='me')m.status='read'});
    saveChats();

    // Update UI
    document.getElementById('emptyChatState').classList.add('hidden');
    const activeView=document.getElementById('activeChatView');
    activeView.classList.remove('hidden');
    activeView.classList.add('flex');

    // Header
    const name=chat.type==='group'?chat.groupName:chat.peer.name;
    const avatar=chat.type==='group'?null:chat.peer.avatar;
    document.getElementById('chatHeaderName').textContent=name;

    if(avatar){
        document.getElementById('chatHeaderAvatar').src=avatar;
        document.getElementById('chatHeaderAvatar').style.display='';
    } else {
        document.getElementById('chatHeaderAvatar').style.display='none';
    }

    const online=chat.type==='private'&&chat.peer.online;
    document.getElementById('chatHeaderStatus').textContent=chat.type==='group'?chat.members.length+' أعضاء':(online?'متصل الآن':'غير متصل');

    renderMessages(chat);
    renderChatList();

    // Mobile: hide sidebar
    if(window.innerWidth<=768){
        document.getElementById('sidebar').classList.add('hidden-mobile');
    }

    // Scroll to bottom
    setTimeout(()=>{
        const container=document.getElementById('messagesContainer');
        container.scrollTop=container.scrollHeight;
    },100);

    // Simulate typing for demo
    if(chat.type==='private'&&chat.peer.id==='u1'){
        simulateTyping(chat);
    }
}

function goBackToList(){
    document.getElementById('sidebar').classList.remove('hidden-mobile');

// ═══════════════════════════════════════════
// RENDER MESSAGES
// ═══════════════════════════════════════════
function renderMessages(chat){
    const container=document.getElementById('messagesContainer');
    let html='';

    chat.messages.forEach((msg,idx)=>{
        const isSent=msg.sender==='me';
        const bubbleClass=isSent?'msg-sent':'msg-received';
        const animClass=isSent?'anim-slideR':'anim-slideL';
        const time=formatTime(msg.time);

        // Status icon
        let statusIcon='';
        if(isSent){
            switch(msg.status){
                case 'sent': statusIcon='<span class="material-symbols-outlined text-[14px] status-sent">done</span>'; break;
                case 'delivered': statusIcon='<span class="material-symbols-outlined text-[14px] status-delivered">done_all</span>'; break;
                case 'read': statusIcon='<span class="material-symbols-outlined text-[14px] status-read">done_all</span>'; break;
            }
        }

        // Sender name for group
        let senderName='';
        if(chat.type==='group'&&!isSent&&msg.senderName){
            senderName=`<p class="text-xs font-bold text-[#f26522] mb-1">${esc(msg.senderName)}</p>`;
        }

        // Message content by type
        let content='';
        switch(msg.type){
            case 'text':
                content=`<p class="text-sm leading-relaxed">${formatMsgText(msg.text)}</p>`;
                break;
            case 'image':
                content=`<div class="msg-image" onclick="viewFullImage('${msg.imageUrl}')"><img src="${msg.imageUrl}" loading="lazy"/></div>`;
                if(msg.text) content+=`<p class="text-sm mt-2">${formatMsgText(msg.text)}</p>`;
                break;
            case 'video':
                content=`<div class="msg-video"><video src="${msg.videoUrl||''}" poster="${msg.videoPoster||''}" preload="metadata"></video><div class="play-overlay"><span class="material-symbols-outlined text-white text-[40px]" style="font-variation-settings:'FILL' 1">play_circle</span></div></div>`;
                break;
            case 'file':
                const fIcons={pdf:'picture_as_pdf',doc:'description',xls:'table_chart',zip:'folder_zip'};
                content=`<div class="msg-file"><div class="w-10 h-10 rounded-lg bg-[#f26522]/10 flex items-center justify-center shrink-0"><span class="material-symbols-outlined text-[#f26522] text-[22px]">${fIcons[msg.fileType]||'description'}</span></div><div class="min-w-0"><p class="text-sm font-bold truncate">${esc(msg.fileName)}</p><p class="text-[11px] text-[#7a7570]">${msg.fileSize}</p></div></div>`;
                break;
            case 'audio':
                content=`<div class="msg-audio"><button onclick="playAudioMsg(this)" class="w-9 h-9 rounded-full bg-[#f26522]/15 flex items-center justify-center shrink-0"><span class="material-symbols-outlined text-[#f26522] text-[18px]" style="font-variation-settings:'FILL' 1">play_arrow</span></button><div class="waveform">${Array(20).fill(0).map((_,i)=>`<span style="animation-delay:${i*0.06}s;height:${4+Math.random()*16}px"></span>`).join('')}</div><span class="text-xs text-[#7a7570] shrink-0">${formatDuration(msg.audioDuration||0)}</span></div>`;
                break;
        }

        html+=`
        <div class="flex ${isSent?'justify-start':'justify-end'} ${animClass}">
            <div class="msg-bubble ${bubbleClass}" style="max-width:75%">
                ${senderName}
                ${content}
                <div class="msg-time">${time} ${statusIcon}</div>
            </div>
        </div>`;
    });

    container.innerHTML=html;
    container.scrollTop=container.scrollHeight;
}

function formatMsgText(text){
    let s=esc(text);
    s=s.replace(/\n/g,'<br>');
    s=s.replace(/#([\u0600-\u06FFa-zA-Z0-9_]+)/g,'<span style="color:#f26522;font-weight:600">#$1</span>');
    s=s.replace(/@([a-zA-Z0-9_]+)/g,'<span style="color:#60a5fa;font-weight:600">@$1</span>');
    return s;
}

// ═══════════════════════════════════════════
// SEND MESSAGE
// ═══════════════════════════════════════════
function sendMessage(){
    const chat=chats.find(c=>c.id===activeChatId);
    if(!chat) return;

    const input=document.getElementById('msgInput');
    const text=input.value.trim();

    // Image pending
    if(pendingImage){
        const msg={id:genId(),sender:'me',type:'image',text:text,imageUrl:pendingImage,time:new Date().toISOString(),status:'sent'};
        chat.messages.push(msg);
        pendingImage=null;
        document.getElementById('imgSendPreview').classList.add('hidden');
        input.value='';
        updateAndRender(chat);
        simulateDelivery(chat,msg.id);
        return;
    }

    // File pending
    if(pendingFile){
        const msg={id:genId(),sender:'me',type:'file',text:text,fileName:pendingFile.name,fileSize:pendingFile.size,fileType:pendingFile.ext,time:new Date().toISOString(),status:'sent'};
        chat.messages.push(msg);
        pendingFile=null;
        input.value='';
        updateAndRender(chat);
        simulateDelivery(chat,msg.id);
        return;
    }

    // Text
    if(!text) return;

    const msg={id:genId(),sender:'me',type:'text',text:text,time:new Date().toISOString(),status:'sent'};
    chat.messages.push(msg);
    input.value='';
    updateAndRender(chat);

    // Simulate delivery + read
    simulateDelivery(chat,msg.id);

    // Simulate reply for demo
    if(chat.type==='private'){
        simulateAutoReply(chat);
    }
}

function updateAndRender(chat){
    saveChats();
    renderMessages(chat);
    renderChatList();
}

function simulateDelivery(chat,msgId){
    setTimeout(()=>{
        const msg=chat.messages.find(m=>m.id===msgId);
        if(msg){msg.status='delivered';saveChats();renderMessages(chat)}
    },1000);
    setTimeout(()=>{
        const msg=chat.messages.find(m=>m.id===msgId);
        if(msg){msg.status='read';saveChats();renderMessages(chat)}
    },3000);
}

function simulateAutoReply(chat){
    setTimeout(()=>{
        chat.typing=true;
        renderChatList();
        document.getElementById('typingIndicator').classList.remove('hidden');
        document.getElementById('typingName').textContent=chat.peer.name;
    },2000);

    setTimeout(()=>{
        chat.typing=false;
        document.getElementById('typingIndicator').classList.add('hidden');

        const replies=[
            'شكراً لك! سأراجع وأرد عليك.',
            'معلومة ممتازة! 👍',
            'فهمت، هل تحتاج مساعدة إضافية؟',
            'تمام، سأتواصل معك لاحقاً.',
            'أقدر تواصلك معي 🙏',
            'ملاحظة مهمة، شكراً للمشاركة.'
        ];
        const reply=replies[Math.floor(Math.random()*replies.length)];

        chat.messages.push({
            id:genId(),sender:chat.peer.id,type:'text',
            text:reply,time:new Date().toISOString(),status:'read'
        });
        if(activeChatId!==chat.id) chat.unread=(chat.unread||0)+1;
        saveChats();
        if(activeChatId===chat.id) renderMessages(chat);
        renderChatList();
    },4500);
}

function handleImageAttach(input){
    const file=input.files[0];
    if(!file)return;
    if(file.size>10*1024*1024){showToast('حجم الصورة يتجاوز 10MB','error');return}

    const reader=new FileReader();
    reader.onload=function(e){

        document.getElementById('imgSendThumb').src=e.target.result;
        document.getElementById('imgSendPreview').classList.remove('hidden');

// ═══════════════════════════════════════════
// FILE ATTACH
// ═══════════════════════════════════════════
function handleFileAttach(input){
    const file=input.files[0];
    if(!file)return;
    if(file.size>50*1024*1024){showToast('حجم الملف يتجاوز 50MB','error');return}

    const ext=file.name.split('.').pop().toLowerCase();
    const sizeMB=(file.size/(1024*1024)).toFixed(1)+' MB';

    pendingFile={name:file.name,size:sizeMB,ext:ext};
    showToast('تم إرفاق: '+file.name,'success');
    input.value='';
}

// ═══════════════════════════════════════════
// VOICE RECORDING
// ═══════════════════════════════════════════
async function startRecording(){
    if(isRecording)return;
    try{
        const stream=await navigator.mediaDevices.getUserMedia({audio:true});
        mediaRecorder=new MediaRecorder(stream);
        audioChunks=[];
        mediaRecorder.ondataavailable=e=>audioChunks.push(e.data);
        mediaRecorder.start();
        isRecording=true;
        recordingSeconds=0;
        document.getElementById('recordingBar').classList.remove('hidden');
        document.getElementById('recordingTime').textContent='00:00';
        recordingInterval=setInterval(()=>{
            recordingSeconds++;
            document.getElementById('recordingTime').textContent=formatDuration(recordingSeconds);
        },1000);
    }catch(err){
        showToast('لا يمكن الوصول للميكروفون','error');
    }
}

function stopRecording(){
    if(!isRecording||!mediaRecorder)return;
    mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(t=>t.stop());
    isRecording=false;
    clearInterval(recordingInterval);
}

function cancelRecording(){
    if(isRecording){
        mediaRecorder.stop();
        mediaRecorder.stream.getTracks().forEach(t=>t.stop());
        isRecording=false;
    }
    clearInterval(recordingInterval);
    audioChunks=[];
    document.getElementById('recordingBar').classList.add('hidden');
}

function sendRecording(){
    if(!isRecording){
        // Already stopped
    }
    if(audioChunks.length===0&&recordingSeconds<1){
        showToast('التسجيل قصير جداً','error');
        cancelRecording();
        return;
    }

    const chat=chats.find(c=>c.id===activeChatId);
    if(!chat)return;

    const msg={id:genId(),sender:'me',type:'audio',text:'',audioDuration:recordingSeconds,time:new Date().toISOString(),status:'sent'};
    chat.messages.push(msg);
    document.getElementById('recordingBar').classList.add('hidden');
    audioChunks=[];
    updateAndRender(chat);
    simulateDelivery(chat,msg.id);
    showToast('تم إرسال التسجيل الصوتي','success');
}

function renderUserList(filter=''){
    const container=document.getElementById('userList');
    const filtered=USERS.filter(u=>u.name.toLowerCase().includes(filter.toLowerCase())||u.username.toLowerCase().includes(filter.toLowerCase()));

    container.innerHTML=filtered.map(user=>{
        const existingChat=chats.find(c=>c.type==='private'&&c.peer.id===user.id);
        return `
        <div class="flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 cursor-pointer transition-colors" onclick="${existingChat?`openChat('${existingChat.id}');document.getElementById('newChatModal').classList.remove('active')`:`createNewPrivateChat('${user.id}')`}">
            <div class="relative">
                <img src="${user.avatar}" class="w-10 h-10 rounded-full object-cover"/>
                ${user.online?'<div class="absolute bottom-0 left-0 w-2.5 h-2.5 bg-green-400 rounded-full border-2 border-[#1a1a1a]"></div>':''}
            </div>
            <div class="flex-1">
                <p class="font-bold text-sm">${esc(user.name)}</p>
                <p class="text-xs text-[#7a7570]">@${user.username}</p>
            </div>
            <span class="material-symbols-outlined text-[#7a7570] text-[20px]">${existingChat?'chat':'add'}</span>

    }).join('');
}

function filterUsers(val){renderUserList(val)}

function createNewPrivateChat(userId){
    const user=USERS.find(u=>u.id===userId);
    if(!user)return;

    const newChat={id:'ch_'+Date.now(),type:'private',peer:{...user},messages:[],unread:0,typing:false};
    chats.push(newChat);
    saveChats();
    document.getElementById('newChatModal').classList.remove('active');
    openChat(newChat.id);
    renderChatList();
    showToast('تم إنشاء محادثة مع '+user.name,'success');
}

// NEW GROUP MODAL
// ═══════════════════════════════════════════
function openNewGroupModal(){
    groupSelectedMembers=[];
    groupImgData=null;
    document.getElementById('groupNameInput').value='';
    document.getElementById('newGroupModal').classList.add('active');
    renderGroupMembersList();
}

function renderGroupMembersList(){
    const container=document.getElementById('groupMembersList');
    container.innerHTML=USERS.map(user=>{
        const selected=groupSelectedMembers.includes(user.id);
        return `
        <label class="flex items-center gap-3 p-2.5 rounded-xl hover:bg-white/5 cursor-pointer transition-colors">
            <input type="checkbox" ${selected?'checked':''} onchange="toggleGroupMember('${user.id}',this.checked)" class="w-4 h-4 accent-[#f26522]"/>
            <img src="${user.avatar}" class="w-9 h-9 rounded-full object-cover"/>
            <div class="flex-1">
                <p class="font-bold text-sm">${esc(user.name)}</p>
                <p class="text-xs text-[#7a7570]">@${user.username}</p>
            </div>
        </label>`;
    }).join('');
}

function toggleGroupMember(userId,add){
    if(add&&!groupSelectedMembers.includes(userId))groupSelectedMembers.push(userId);
    if(!add)groupSelectedMembers=groupSelectedMembers.filter(id=>id!==userId);
    renderSelectedMembers();
}

function renderSelectedMembers(){
    const container=document.getElementById('selectedMembers');
    if(groupSelectedMembers.length===0){container.classList.add('hidden');return}
    container.classList.remove('hidden');
    container.innerHTML=groupSelectedMembers.map(id=>{
        const user=USERS.find(u=>u.id===id);
        return `<span class="inline-flex items-center gap-1 bg-[#f26522]/15 text-[#f26522] text-xs font-semibold px-3 py-1 rounded-full">${esc(user.name)} <button onclick="toggleGroupMember('${id}',false)" class="hover:text-white"><span class="material-symbols-outlined text-[14px]">close</span></button></span>`;
    }).join('');
}

function handleGroupImg(input){
    const file=input.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=e=>{groupImgData=e.target.result};
    reader.readAsDataURL(file);
}

function createGroup(){
    const name=document.getElementById('groupNameInput').value.trim();
    if(!name){showToast('أدخل اسم المجموعة','error');return}
    if(groupSelectedMembers.length<1){showToast('أضف عضواً واحداً على الأقل','error');return}

    const members=[{...ME,role:'admin'},...groupSelectedMembers.map(id=>{const u=USERS.find(usr=>usr.id===id);return{...u,role:'member'}})];

    const colors=['#f26522','#3b82f6','#22c55e','#8b5cf6','#ec4899'];
    const newChat={
        id:'ch_'+Date.now(),type:'group',groupName:name,
        groupAvatar:groupImgData,groupColor:colors[Math.floor(Math.random()*colors.length)],
        members:members,messages:[],unread:0,typing:false
    };

    chats.push(newChat);
    saveChats();
    document.getElementById('newGroupModal').classList.remove('active');
    openChat(newChat.id);
    renderChatList();
    showToast('تم إنشاء المجموعة: '+name,'success');
}

// CHAT INFO (Group Management)

function openChatInfo(){
    const chat=chats.find(c=>c.id===activeChatId);
    if(!chat)return;

    const modal=document.getElementById('chatInfoModal');
    const title=document.getElementById('infoTitle');
    const content=document.getElementById('chatInfoContent');

    if(chat.type==='group'){
        title.textContent='معلومات المجموعة';
        const isAdmin=chat.members.find(m=>m.id===ME.id)?.role==='admin';
        content.innerHTML=`
            <div class="text-center mb-4">
                <div class="w-20 h-20 rounded-full mx-auto mb-3 flex items-center justify-center text-2xl font-bold" style="background:${chat.groupColor}20;color:${chat.groupColor}">
                    <span class="material-symbols-outlined text-[36px]" style="font-variation-settings:'FILL' 1">group</span>
                </div>
                <h3 class="text-lg font-extrabold">${esc(chat.groupName)}</h3>
                <p class="text-sm text-[#7a7570]">${chat.members.length} أعضاء</p>
            </div>
            <h4 class="text-sm font-bold text-[#e1bfb3] mb-3">الأعضاء</h4>
            <div class="space-y-2 max-h-[300px] overflow-y-auto">
                ${chat.members.map(m=>`
                    <div class="flex items-center gap-3 p-2 rounded-xl hover:bg-white/5 transition-colors">
                        <img src="${m.avatar}" class="w-9 h-9 rounded-full object-cover"/>
                        <div class="flex-1">
                            <p class="font-bold text-sm">${esc(m.name)} ${m.id===ME.id?'<span class="text-xs text-[#7a7570]">(أنت)</span>':''}</p>
                            <p class="text-xs ${m.role==='admin'?'text-[#f26522]':'text-[#7a7570]'}">${m.role==='admin'?'مشرف':'عضو'}</p>
                        </div>
                        ${isAdmin&&m.id!==ME.id?`
                            <button onclick="removeMember('${chat.id}','${m.id}')" class="text-red-400 p-1 rounded hover:bg-red-500/10 transition-colors" title="إزالة">
                                <span class="material-symbols-outlined text-[18px]">person_remove</span>
                            </button>
                        `:''}
                    </div>
                `).join('')}
            </div>
            ${isAdmin?`
                <button onclick="addMemberToGroup('${chat.id}')" class="btn-ghost w-full justify-center mt-4">
                    <span class="material-symbols-outlined text-[18px]">person_add</span>
                    إضافة عضو
                </button>
            `:''}
        `;
    } else {
        title.textContent='معلومات المحادثة';
        content.innerHTML=`
            <div class="text-center">
                <img src="${chat.peer.avatar}" class="w-20 h-20 rounded-full object-cover mx-auto mb-3"/>
                <h3 class="text-lg font-extrabold">${esc(chat.peer.name)}</h3>
                <p class="text-sm text-[#7a7570]">@${chat.peer.username}</p>

            </div>

    }

    modal.classList.add('active');
}

function removeMember(chatId,memberId){
    if(!confirm('هل تريد إزالة هذا العضو؟'))return;
    const chat=chats.find(c=>c.id===chatId);
    if(!chat)return;
    chat.members=chat.members.filter(m=>m.id!==memberId);
    saveChats();
    openChatInfo();
    showToast('تم إزالة العضو','success');
}
