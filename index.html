<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>لو بوك — الرئيسية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="css/icons.css"/>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
        :root{
            --bg:#09090b;--surface:#18181b;--surface-2:#1f1f23;--surface-3:#27272a;
            --accent:#f97316;--accent-hover:#ea580c;--accent-glow:rgba(249,115,22,.15);
            --text:#fafafa;--text-secondary:#a1a1aa;--text-muted:#52525b;
            --border:rgba(255,255,255,.06);--border-light:rgba(255,255,255,.1);
            --green:#22c55e;--red:#ef4444;--blue:#3b82f6;--purple:#a855f7;--yellow:#eab308;
            --radius:16px;--radius-sm:10px;--radius-xs:6px;
        }
        html{scroll-behavior:smooth}
        body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
        code,.mono{font-family:'DM Mono',monospace}
        .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle}

        /* ─── Scrollbar ─── */
        ::-webkit-scrollbar{width:3px}
        ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:3px}

        /* ─── Animations ─── */
        @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        @keyframes scaleIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
        @keyframes slideRight{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.25)}}
        @keyframes heartBeat{0%{transform:scale(0)}15%{transform:scale(1.4)}30%{transform:scale(.9)}45%{transform:scale(1.1)}60%{transform:scale(1)}}
        @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
        @keyframes breathe{0%,100%{box-shadow:0 0 0 0 rgba(249,115,22,.3)}70%{box-shadow:0 0 0 12px rgba(249,115,22,0)}}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes storyRing{0%{transform:rotate(0)}to{transform:rotate(360deg)}}
        .a-fade{animation:fadeIn .4s ease both}
        .a-fadeUp{animation:fadeUp .5s cubic-bezier(.22,1,.36,1) both}

        /* ─── Top Navbar ─── */
        .navbar{position:fixed;top:0;left:0;right:0;height:56px;z-index:100;display:flex;align-items:center;padding:0 16px;gap:12px;background:rgba(9,9,11,.82);backdrop-filter:blur(24px) saturate(1.2);-webkit-backdrop-filter:blur(24px) saturate(1.2);border-bottom:1px solid var(--border)}
        .navbar .logo{font-size:20px;font-weight:900;background:linear-gradient(135deg,var(--accent),#facc15);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.5px}
        .navbar .nav-actions{display:flex;align-items:center;gap:4px;margin-right:auto}
        .nav-btn{width:40px;height:40px;border-radius:var(--radius-sm);border:none;background:transparent;color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;transition:all .2s}
        .nav-btn:hover{background:var(--surface-2);color:var(--text)}
        .nav-btn .badge-dot{position:absolute;top:8px;left:8px;width:8px;height:8px;border-radius:50%;background:var(--accent);border:2px solid var(--bg)}

        /* ─── Bottom Navbar ─── */
        .bottombar{position:fixed;bottom:0;left:0;right:0;height:64px;z-index:100;display:flex;align-items:center;justify-content:space-around;background:rgba(9,9,11,.88);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--border);padding:0 8px}
        .bottom-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 12px;border-radius:var(--radius-sm);border:none;background:transparent;cursor:pointer;transition:all .25s;position:relative;min-width:56px}
        .bottom-item .material-symbols-outlined{font-size:24px;color:var(--text-muted);transition:all .25s}
        .bottom-item span:not(.material-symbols-outlined){font-size:9px;font-weight:600;color:var(--text-muted);transition:color .25s}
        .bottom-item.active .material-symbols-outlined{color:var(--accent);font-variation-settings:'FILL' 1}
        .bottom-item.active span:not(.material-symbols-outlined){color:var(--accent)}
        .bottom-item .count-badge{position:absolute;top:2px;right:10px;min-width:16px;height:16px;padding:0 4px;border-radius:8px;background:var(--accent);color:white;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center}

        /* ─── Stories ─── */
        .stories-bar{display:flex;gap:12px;padding:12px 16px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
        .stories-bar::-webkit-scrollbar{display:none}
        .story-item{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;flex-shrink:0}
        .story-ring{width:68px;height:68px;border-radius:50%;padding:3px;background:linear-gradient(135deg,var(--accent),#a855f7,var(--blue),var(--accent));background-size:300% 300%;animation:storyRing 4s linear infinite;transition:transform .2s}
        .story-ring:hover{transform:scale(1.08)}
        .story-ring.seen{background:var(--surface-3);animation:none}
        .story-ring img{width:100%;height:100%;border-radius:50%;object-fit:cover;border:3px solid var(--bg)}
        .story-name{font-size:10px;font-weight:600;color:var(--text-secondary);max-width:68px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .story-add{position:relative}
        .story-add .add-icon{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:22px;height:22px;border-radius:50%;background:var(--accent);border:3px solid var(--bg);display:flex;align-items:center;justify-content:center}
        .story-add .add-icon .material-symbols-outlined{font-size:14px;color:white}

        /* ─── Post Card ─── */
        .post-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin:8px 16px;overflow:hidden;transition:border-color .3s}
        .post-card:hover{border-color:var(--border-light)}
        .post-header{display:flex;align-items:center;gap:10px;padding:14px 16px 10px}
        .post-avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;cursor:pointer;border:2px solid transparent;transition:border-color .2s}
        .post-avatar:hover{border-color:var(--accent)}
        .post-user-info{flex:1;min-width:0}
        .post-username{font-size:13px;font-weight:700;display:flex;align-items:center;gap:4px;cursor:pointer}
        .post-username:hover{color:var(--accent)}
        .verified-badge{display:inline-flex;width:16px;height:16px;border-radius:50%;align-items:center;justify-content:center;flex-shrink:0}
        .verified-badge.blue{background:var(--blue)}
        .verified-badge.orange{background:var(--accent)}
        .verified-badge .material-symbols-outlined{font-size:11px;color:white;font-variation-settings:'FILL' 1}
        .post-meta{font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:4px}
        .post-more{width:32px;height:32px;border-radius:50%;border:none;background:transparent;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
        .post-more:hover{background:var(--surface-2);color:var(--text)}
        .post-body{padding:0 16px 12px}
        .post-text{font-size:14px;line-height:1.7;color:var(--text-secondary);word-break:break-word}
        .post-text .hashtag{color:var(--accent);font-weight:600;cursor:pointer}
        .post-text .hashtag:hover{text-decoration:underline}
        .post-text .mention{color:var(--blue);font-weight:600;cursor:pointer}
        .post-image-container{margin-top:8px;border-radius:var(--radius-sm);overflow:hidden;position:relative;cursor:pointer}
        .post-image-container img{width:100%;display:block;max-height:500px;object-fit:cover;transition:transform .3s}
        .post-image-container:hover img{transform:scale(1.02)}
        .post-actions{display:flex;align-items:center;padding:6px 12px;border-top:1px solid var(--border)}
        .action-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;border-radius:var(--radius-sm);border:none;background:transparent;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:12px;font-weight:600;color:var(--text-muted);transition:all .2s}
        .action-btn:hover{background:var(--surface-2)}
        .action-btn .material-symbols-outlined{font-size:20px;transition:all .2s}
        .action-btn.liked{color:var(--red)}
        .action-btn.liked .material-symbols-outlined{font-variation-settings:'FILL' 1;animation:pulse .4s ease}
        .action-btn.saved{color:var(--yellow)}
        .action-btn.saved .material-symbols-outlined{font-variation-settings:'FILL' 1}
        .post-stats{display:flex;align-items:center;gap:12px;padding:0 16px 4px;font-size:11px;color:var(--text-muted)}
        .post-stats span{display:flex;align-items:center;gap:3px}

        /* ─── Comments ─── */
        .comments-section{padding:0 16px 14px;display:none}
        .comments-section.open{display:block;animation:fadeUp .3s ease}
        .comment-input-wrap{display:flex;gap:8px;margin-bottom:12px}
        .comment-input-wrap img{width:32px;height:32px;border-radius:50%;object-fit:cover}
        .comment-input{flex:1;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;color:var(--text);font-size:13px;font-family:'Tajawal',sans-serif;outline:none;transition:border-color .3s}
        .comment-input:focus{border-color:var(--accent)}
        .comment-input::placeholder{color:var(--text-muted)}
        .comment-send{width:36px;height:36px;border-radius:var(--radius-sm);border:none;background:var(--accent);color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;opacity:.5}
        .comment-send.active{opacity:1}
        .comment-send:hover{background:var(--accent-hover)}
        .comment-item{display:flex;gap:8px;margin-bottom:10px}
        .comment-item img{width:28px;height:28px;border-radius:50%;object-fit:cover;flex-shrink:0}
        .comment-bubble{background:var(--surface-2);border-radius:var(--radius-sm);padding:8px 12px;flex:1}
        .comment-name{font-size:11px;font-weight:700;color:var(--text);cursor:pointer}
        .comment-name:hover{color:var(--accent)}
        .comment-text{font-size:12px;color:var(--text-secondary);margin-top:2px;line-height:1.6}
        .comment-time{font-size:10px;color:var(--text-muted);margin-top:4px}

        /* ─── Create Post Modal ─── */
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:200;display:none;align-items:flex-end;justify-content:center}
        .modal-overlay.active{display:flex;animation:fadeIn .2s ease}
        .modal-sheet{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:540px;max-height:85dvh;overflow-y:auto;animation:fadeUp .3s cubic-bezier(.22,1,.36,1);padding:20px}
        .modal-handle{width:40px;height:4px;border-radius:2px;background:var(--surface-3);margin:0 auto 16px}
        .create-textarea{width:100%;min-height:120px;background:transparent;border:none;color:var(--text);font-size:16px;font-family:'Tajawal',sans-serif;resize:none;outline:none;line-height:1.7}
        .create-textarea::placeholder{color:var(--text-muted)}
        .create-toolbar{display:flex;align-items:center;gap:8px;padding:12px 0;border-top:1px solid var(--border)}
        .toolbar-btn{width:40px;height:40px;border-radius:var(--radius-sm);border:none;background:transparent;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
        .toolbar-btn:hover{background:var(--surface-2);color:var(--accent)}
        .char-count{font-size:11px;font-family:'DM Mono',monospace;margin-right:auto;color:var(--text-muted)}
        .char-count.warn{color:var(--yellow)}
        .char-count.over{color:var(--red)}
        .post-submit{padding:8px 24px;border-radius:var(--radius-sm);border:none;background:var(--accent);color:white;font-weight:700;font-size:13px;font-family:'Tajawal',sans-serif;cursor:pointer;transition:all .2s}
        .post-submit:hover{background:var(--accent-hover)}
        .post-submit:disabled{opacity:.4;cursor:not-allowed}
        .image-preview-area{position:relative;border-radius:var(--radius-sm);overflow:hidden;margin-top:8px;display:none}
        .image-preview-area img{width:100%;max-height:300px;object-fit:cover}
        .remove-image{position:absolute;top:8px;left:8px;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,.7);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}

        /* ─── Story Viewer ─── */
        .story-viewer{position:fixed;inset:0;background:#000;z-index:300;display:none}
        .story-viewer.active{display:flex;animation:fadeIn .3s ease}
        .story-viewer img{width:100%;height:100%;object-fit:contain}
        .story-progress{position:absolute;top:8px;left:8px;right:8px;display:flex;gap:3px;z-index:10}
        .story-progress .bar{flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,.3);overflow:hidden}
        .story-progress .bar .fill{height:100%;background:white;border-radius:2px;transition:width linear}
        .story-progress .bar.done .fill{width:100%}
        .story-header{position:absolute;top:20px;left:12px;right:12px;display:flex;align-items:center;gap:10px;z-index:10}
        .story-header img{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.5)}
        .story-header .name{font-size:14px;font-weight:700;color:white;text-shadow:0 1px 4px rgba(0,0,0,.5)}
        .story-header .time{font-size:11px;color:rgba(255,255,255,.7)}
        .story-close{position:absolute;top:20px;left:12px;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.4);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10}
        .story-nav{position:absolute;top:0;bottom:0;width:40%;z-index:5;cursor:pointer}
        .story-nav.prev{right:0}
        .story-nav.next{left:0}
        .story-caption{position:absolute;bottom:40px;left:16px;right:16px;text-align:center;z-index:10}
        .story-caption p{font-size:14px;color:white;text-shadow:0 1px 4px rgba(0,0,0,.6);background:rgba(0,0,0,.3);padding:8px 16px;border-radius:var(--radius-sm);display:inline-block}

        /* ─── More Menu ─── */
        .more-menu{position:absolute;top:100%;left:0;background:var(--surface-2);border:1px solid var(--border-light);border-radius:var(--radius-sm);padding:6px;min-width:180px;z-index:50;display:none;box-shadow:0 12px 40px rgba(0,0,0,.5)}
        .more-menu.open{display:block;animation:scaleIn .2s ease}
        .more-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-xs);border:none;background:transparent;color:var(--text-secondary);cursor:pointer;font-size:13px;font-weight:600;font-family:'Tajawal',sans-serif;width:100%;text-align:right;transition:all .2s}
        .more-item:hover{background:var(--surface-3);color:var(--text)}
        .more-item.danger{color:var(--red)}
        .more-item.danger:hover{background:rgba(239,68,68,.1)}
        .more-item .material-symbols-outlined{font-size:18px}

        /* ─── Toast ─── */
        .toast{position:fixed;top:72px;left:50%;transform:translateX(-50%) translateY(-100px);z-index:9999;padding:12px 24px;border-radius:var(--radius-sm);font-weight:700;font-size:13px;opacity:0;transition:all .45s cubic-bezier(.68,-.55,.265,1.55);display:flex;align-items:center;gap:8px;backdrop-filter:blur(16px);max-width:90vw;color:white;pointer-events:none}
        .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
        .toast.success{background:rgba(34,197,94,.18);border:1px solid rgba(34,197,94,.35)}
        .toast.error{background:rgba(239,68,68,.18);border:1px solid rgba(239,68,68,.35)}
        .toast.info{background:rgba(59,130,246,.18);border:1px solid rgba(59,130,246,.35)}

        /* ─── Skeleton ─── */
        .skeleton{background:linear-gradient(90deg,var(--surface-2) 25%,var(--surface-3) 50%,var(--surface-2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--radius-sm)}

        /* ─── Empty State ─── */
        .empty-state{text-align:center;padding:40px 20px}
        .empty-state .material-symbols-outlined{font-size:56px;color:var(--text-muted);opacity:.3;display:block;margin-bottom:12px}
        .empty-state p{font-size:13px;color:var(--text-muted)}


        .composer-card{background:linear-gradient(180deg,rgba(31,31,35,.98),rgba(24,24,27,.98));border:1px solid var(--border);border-radius:20px;margin:10px 16px 14px;padding:14px;box-shadow:0 12px 30px rgba(0,0,0,.18)}
        .composer-head{display:flex;align-items:center;gap:10px}
        .composer-head img{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid rgba(249,115,22,.28)}
        .composer-input{flex:1;background:var(--surface-2);border:1px solid rgba(255,255,255,.05);border-radius:16px;padding:12px 14px;color:var(--text-secondary);font-family:'Tajawal',sans-serif;font-size:13px;text-align:right;cursor:pointer;transition:all .22s}
        .composer-input:hover{border-color:rgba(249,115,22,.22);color:var(--text)}
        .composer-actions{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:12px}
        .composer-action{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px 8px;border:none;border-radius:14px;background:rgba(255,255,255,.03);color:var(--text-secondary);font-size:12px;font-weight:700;font-family:'Tajawal',sans-serif;cursor:pointer;transition:all .22s}
        .composer-action:hover{background:rgba(249,115,22,.08);color:var(--text)}
        .composer-action .material-symbols-outlined{font-size:19px;color:var(--accent)}
        .poll-builder{display:none;margin-top:12px;padding:12px;border-radius:14px;background:var(--surface-2);border:1px solid var(--border)}
        .poll-builder.open{display:block;animation:fadeUp .25s ease}
        .poll-builder-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:12px;font-weight:700;color:var(--text-secondary)}
        .poll-options{display:flex;flex-direction:column;gap:8px}
        .poll-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 12px;color:var(--text);font-size:13px;font-family:'Tajawal',sans-serif;outline:none}
        .poll-input:focus{border-color:rgba(249,115,22,.35)}
        .poll-builder-actions{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:10px}
        .poll-add-btn{border:none;background:rgba(249,115,22,.12);color:var(--accent);padding:8px 12px;border-radius:10px;font-size:12px;font-weight:700;font-family:'Tajawal',sans-serif;cursor:pointer}
        .poll-meta{font-size:11px;color:var(--text-muted)}
        .poll-card{margin-top:10px;padding:12px;border-radius:14px;background:var(--surface-2);border:1px solid var(--border)}
        .poll-title{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px}
        .poll-option-btn{position:relative;overflow:hidden;width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;text-align:right;padding:10px 12px;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--text-secondary);font-family:'Tajawal',sans-serif;font-size:13px;cursor:pointer;margin-bottom:8px}
        .poll-option-btn:disabled{cursor:default}
        .poll-option-fill{position:absolute;inset:0 auto 0 0;background:linear-gradient(90deg,rgba(249,115,22,.2),rgba(249,115,22,.06));width:0;transition:width .3s ease}
        .poll-option-content,.poll-option-meta{position:relative;z-index:1}
        .poll-option-meta{font-size:11px;font-weight:700;color:var(--accent)}
        .poll-option-btn.selected{border-color:rgba(249,115,22,.35);color:var(--text)}
        .bottom-item.profile-item{min-width:62px}
        .bottom-avatar-wrap{width:28px;height:28px;border-radius:50%;padding:2px;background:linear-gradient(135deg,var(--accent),#facc15);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 18px rgba(249,115,22,.16)}
        .bottom-avatar{width:100%;height:100%;border-radius:50%;object-fit:cover;border:2px solid var(--bg)}

        /* ─── Spacing ─── */
        .page-spacer-top{height:56px}
        .page-spacer-bottom{height:72px}
        .divider{height:6px;background:var(--bg);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}

        @media(min-width:640px){
            .navbar{padding:0 24px}
            .post-card{margin:8px auto;max-width:560px}
            .stories-bar{padding:12px 24px;justify-content:center}
            .composer-card{max-width:560px;margin:10px auto 14px}
            .modal-overlay{align-items:center}
            .modal-sheet{border-radius:var(--radius);max-height:80dvh}
        }
    </style>
    <link rel="icon" type="image/svg+xml" href="favicon.svg"/>

// ██  SHARED DATABASE LAYER  ██
// ═══════════════════════════════════════════════
const DB = {
    _db: null,
    async init(){
        return new Promise((resolve,reject)=>{
            const req=indexedDB.open('LobukDB',1);
            req.onupgradeneeded=e=>{
                const db=e.target.result;
                if(!db.objectStoreNames.contains('users')){
                    const s=db.createObjectStore('users',{keyPath:'id'});
                    s.createIndex('username','username',{unique:true});
                }
                if(!db.objectStoreNames.contains('posts')){
                    const s=db.createObjectStore('posts',{keyPath:'id'});
                    s.createIndex('createdAt','createdAt');
                    s.createIndex('authorId','authorId');
                }
                if(!db.objectStoreNames.contains('comments')){
                    const s=db.createObjectStore('comments',{keyPath:'id'});
                    s.createIndex('postId','postId');
                }
                if(!db.objectStoreNames.contains('stories')){
                    db.createObjectStore('stories',{keyPath:'id'});
                }
                if(!db.objectStoreNames.contains('notifications')){
                    db.createObjectStore('notifications',{keyPath:'id'});
                }
            };
            req.onsuccess=e=>{this._db=e.target.result;resolve()};
            req.onerror=e=>reject(e.target.error);
        });
    },
    async add(store,data){
        return new Promise((resolve,reject)=>{
            if(!data.id)data.id='id_'+Date.now()+'_'+Math.random().toString(36).substr(2,6);
            if(!data.createdAt)data.createdAt=new Date().toISOString();
            const tx=this._db.transaction(store,'readwrite');
            tx.objectStore(store).add(data);
            tx.oncomplete=()=>resolve(data);
            tx.onerror=e=>reject(e.target.error);
        });
    },
    async get(store,key){
        return new Promise((resolve,reject)=>{
            const tx=this._db.transaction(store,'readonly');
            const req=tx.objectStore(store).get(key);
            req.onsuccess=()=>resolve(req.result||null);
            req.onerror=e=>reject(e.target.error);
        });
    },
    async getAll(store){
        return new Promise((resolve,reject)=>{
            const tx=this._db.transaction(store,'readonly');
            const req=tx.objectStore(store).getAll();
            req.onsuccess=()=>resolve(req.result||[]);
            req.onerror=e=>reject(e.target.error);
        });
    },
    async update(store,data){
        return new Promise((resolve,reject)=>{
            const tx=this._db.transaction(store,'readwrite');
            tx.objectStore(store).put(data);
            tx.oncomplete=()=>resolve(data);
            tx.onerror=e=>reject(e.target.error);
        });
    },
    async remove(store,key){
        return new Promise((resolve,reject)=>{
            const tx=this._db.transaction(store,'readwrite');
            tx.objectStore(store).delete(key);
            tx.oncomplete=()=>resolve();
            tx.onerror=e=>reject(e.target.error);
        });
    }
};

function readLB(key){
    try{
        const raw = localStorage.getItem('lb_' + key);
        return raw ? JSON.parse(raw) : null;
    }catch(_){ return null; }
}

function pickAvatar(name='لو بوك'){
    return 'https://ui-avatars.com/api/?background=f97316&color=fff&name=' + encodeURIComponent(name);
}

function mapAuthUserToCurrent(authUser){
    const displayName = authUser.name || 'مستخدم لو بوك';
    const usernameBase = (authUser.email || authUser.phone || displayName)
        .toString()
        .replace(/^\+/, '')
        .replace(/[^a-zA-Z0-9؀-ۿ]+/g, '_')
        .replace(/^_+|_+$/g, '')
        .slice(0, 24) || 'lobuk_user';
    return {
        ...DEFAULT_CURRENT_USER,
        id: authUser.id || DEFAULT_CURRENT_USER.id,
        name: displayName,
        username: usernameBase,
        avatar: authUser.avatar || pickAvatar(displayName),
        bio: authUser.work || authUser.bio || 'عضو جديد في منصة لو بوك',
        verified: !!authUser.verified,
        badgeType: authUser.verified ? 'blue' : '',
        followers: authUser.followers || DEFAULT_CURRENT_USER.followers,
        following: authUser.following || DEFAULT_CURRENT_USER.following,
        postsCount: authUser.postsCount || DEFAULT_CURRENT_USER.postsCount
    };
}

function getAuthCurrentUser(){
    const currentUserId = readLB('currentUserId');
    const users = readLB('users') || [];
    return users.find(u => u.id === currentUserId) || null;
}

// ██  HELPERS  ██
// ═══════════════════════════════════════════════
function esc(t){if(typeof t!=='string')return'';return t.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#x27;'}[c]))}
function timeAgo(dateStr){
    const now=Date.now(),d=new Date(dateStr).getTime();
    const diff=Math.floor((now-d)/1000);
    if(diff<60)return'الآن';
    if(diff<3600)return Math.floor(diff/60)+' د';
    if(diff<86400)return Math.floor(diff/3600)+' س';
    if(diff<604800)return Math.floor(diff/86400)+' ي';
    return new Date(dateStr).toLocaleDateString('ar-SA',{day:'numeric',month:'short'});
}
function formatNumber(n){if(n>=1000000)return(n/1000000).toFixed(1)+'M';if(n>=1000)return(n/1000).toFixed(1)+'K';return n.toString()}
function linkify(text){
    return esc(text)
        .replace(/#([\u0600-\u06FF\w]+)/g,'<span class="hashtag" onclick="event.stopPropagation()">#$1</span>')
        .replace(/@(\w+)/g,'<span class="mention">@$1</span>')
        .replace(/\n/g,'<br>');
}

function showToast(msg,type='info'){
    const t=document.getElementById('toastEl');
    const icons={success:'check_circle',error:'error',info:'info'};
    t.className='toast '+type;
    t.innerHTML='<span class="material-symbols-outlined" style="font-size:18px">'+(icons[type]||'info')+'</span> '+msg;
    requestAnimationFrame(()=>{t.classList.add('show')});
    setTimeout(()=>t.classList.remove('show'),3000);
}

// ═══════════════════════════════════════════════
// ██  STORIES  ██
// ═══════════════════════════════════════════════
let allStories=[];
let currentStoryIdx=0;
let storyTimer=null;

async function renderStories(){
    allStories=await DB.getAll('stories');
    allStories.sort((a,b)=>b.createdAt-a.createdAt);
    const bar=document.getElementById('storiesBar');
    let html='';

    // Your story
    html+=`
    <div class="story-item story-add" onclick="openCreateModal()">
        <div class="story-ring" style="background:var(--surface-3)">
            <img src="${CURRENT_USER.avatar}" alt="قصتك"/>
        </div>
        <div class="add-icon"><span class="material-symbols-outlined">add</span></div>
        <span class="story-name">قصتك</span>
    </div>`;

    // Others
    allStories.forEach((s,i)=>{
        html+=`
        <div class="story-item" onclick="openStoryViewer(${i})">
            <div class="story-ring">
                <img src="${s.userAvatar}" alt="${esc(s.userName)}"/>
            </div>
            <span class="story-name">${esc(s.userName)}</span>
        </div>`;
    });
    bar.innerHTML=html;
}

function openStoryViewer(idx){
    currentStoryIdx=idx;
    const viewer=document.getElementById('storyViewer');
    viewer.classList.add('active');
    document.body.style.overflow='hidden';
    showCurrentStory();
}

function showCurrentStory(){
    const s=allStories[currentStoryIdx];
    if(!s){closeStoryViewer();return}

    // Progress bars
    const prog=document.getElementById('storyProgress');
    prog.innerHTML=allStories.map((_,i)=>
        '<div class="bar'+(i<currentStoryIdx?' done':'')+'"><div class="fill" style="width:'+(i<currentStoryIdx?'100':i===currentStoryIdx?'0':'0')+'%"></div></div>'
    ).join('');

    // Header
    document.getElementById('storyHeader').innerHTML=
        '<img src="'+s.userAvatar+'" alt=""/>' +
        '<div><span class="name">'+esc(s.userName)+'</span><br><span class="time">'+timeAgo(s.createdAt)+'</span></div>';

    // Image
    document.getElementById('storyImage').src=s.image;
    document.getElementById('storyCaption').textContent=s.caption||'';

    // Animate progress
    clearTimeout(storyTimer);
    const fill=prog.children[currentStoryIdx]?.querySelector('.fill');
    if(fill){
        fill.style.transition='none';
        fill.style.width='0%';
        requestAnimationFrame(()=>{
            fill.style.transition='width 5s linear';
            fill.style.width='100%';
        });
        storyTimer=setTimeout(()=>nextStory(),5200);
    }
}

function nextStory(){
    if(currentStoryIdx<allStories.length-1){currentStoryIdx++;showCurrentStory()}
    else closeStoryViewer();
}
function prevStory(){
    if(currentStoryIdx>0){currentStoryIdx--;showCurrentStory()}
}
function closeStoryViewer(){
    clearTimeout(storyTimer);
    document.getElementById('storyViewer').classList.remove('active');
    document.body.style.overflow='';
}

// ═══════════════════════════════════════════════
// ██  FEED  ██
// ═══════════════════════════════════════════════
let feedPosts=[];
let openMenuId=null;

async function renderFeed(){
    feedPosts=await DB.getAll('posts');
    // Sort: pinned first, then by date
    feedPosts.sort((a,b)=>{
        if(a.pinned&&!b.pinned)return -1;
        if(!a.pinned&&b.pinned)return 1;
        return new Date(b.createdAt)-new Date(a.createdAt);
    });

    const feed=document.getElementById('feed');
    if(feedPosts.length===0){
        feed.innerHTML='<div class="empty-state"><span class="material-symbols-outlined">article</span><p>لا توجد منشورات بعد</p></div>';
        return;
    }

    let html='';
    for(const post of feedPosts){
        const author=await DB.get('users',post.authorId);
        if(!author)continue;
        const postComments=await DB.getAll('comments');
        const myComments=postComments.filter(c=>c.postId===post.id);

        html+=`
        <article class="post-card a-fadeUp" data-id="${post.id}">
            <!-- Header -->
            <div class="post-header">
                <img class="post-avatar" src="${author.avatar}" alt="${esc(author.name)}" onclick="goToProfile('${author.id}')"/>
                <div class="post-user-info">
                    <div class="post-username" onclick="goToProfile('${author.id}')">
                        ${esc(author.name)}
                        ${author.verified?`<span class="verified-badge ${author.badgeType}"><span class="material-symbols-outlined">verified</span></span>`:''}
                    </div>
                    <div class="post-meta">
                        <span>${esc(author.bio?.split(' ')[0]||'')}</span>
                        <span>•</span>
                        <span>${timeAgo(post.createdAt)}</span>
                        ${post.pinned?'<span style="color:var(--accent);display:flex;align-items:center;gap:2px"><span class="material-symbols-outlined" style="font-size:14px;font-variation-settings:FILL 1">push_pin</span> مثبت</span>':''}
                    </div>
                </div>
                <div style="position:relative">
                    <button class="post-more" onclick="toggleMenu('${post.id}')">
                        <span class="material-symbols-outlined">more_horiz</span>
                    </button>
                    <div class="more-menu" id="menu_${post.id}">
                        <button class="more-item" onclick="toggleSave('${post.id}');closeMenus()">
                            <span class="material-symbols-outlined">${post.saved?'bookmark_remove':'bookmark_add'}</span>
                            ${post.saved?'إلغاء الحفظ':'حفظ المنشور'}
                        </button>
                        ${post.authorId===CURRENT_USER.id?`
                        <button class="more-item" onclick="togglePin('${post.id}');closeMenus()">
                            <span class="material-symbols-outlined">push_pin</span>
                            ${post.pinned?'إلغاء التثبيت':'تثبيت المنشور'}
                        </button>
                        <button class="more-item danger" onclick="deletePost('${post.id}');closeMenus()">
                            <span class="material-symbols-outlined">delete</span>
                            حذف المنشور
                        </button>`:`
                        <button class="more-item" onclick="closeMenus()">
                            <span class="material-symbols-outlined">flag</span>
                            إبلاغ
                        </button>
                        <button class="more-item" onclick="closeMenus()">
                            <span class="material-symbols-outlined">person_remove</span>
                            إلغاء المتابعة
                        </button>`}
                    </div>
                </div>
            </div>

            <!-- Body -->
            <div class="post-body">
                <p class="post-text">${linkify(post.text)}</p>
                ${post.image?`<div class="post-image-container"><img src="${post.image}" alt="صورة المنشور" loading="lazy"/></div>`:''}
                ${renderPollHTML(post)}
            </div>

            <!-- Stats -->
            <div class="post-stats">
                <span><span class="material-symbols-outlined" style="font-size:14px">favorite</span> ${formatNumber(post.likes)}</span>
                <span>${formatNumber(myComments.length)} تعليق</span>
                <span style="margin-right:auto">${formatNumber(post.shares)} مشاركة</span>
            </div>

            <!-- Actions -->
            <div class="post-actions">
                <button class="action-btn ${post.liked?'liked':''}" onclick="toggleLike('${post.id}')">
                    <span class="material-symbols-outlined">${post.liked?'favorite':'favorite'}</span>
                    <span>${post.liked?'أعجبني':'إعجاب'}</span>
                </button>
                <button class="action-btn" onclick="toggleComments('${post.id}')">
                    <span class="material-symbols-outlined">chat_bubble_outline</span>
                    <span>تعليق</span>
                </button>
                <button class="action-btn" onclick="sharePost('${post.id}')">
                    <span class="material-symbols-outlined">share</span>
                    <span>مشاركة</span>
                </button>
                <button class="action-btn ${post.saved?'saved':''}" onclick="toggleSave('${post.id}')">
                    <span class="material-symbols-outlined">${post.saved?'bookmark':'bookmark'}</span>
                </button>
            </div>

            <!-- Comments -->
            <div class="comments-section" id="comments_${post.id}">
                <div class="comment-input-wrap">
                    <img src="${CURRENT_USER.avatar}" alt=""/>
                    <input class="comment-input" placeholder="اكتب تعليقاً..." id="commentInput_${post.id}" onkeydown="if(event.key==='Enter')addComment('${post.id}')" oninput="toggleSendBtn('${post.id}')"/>
                    <button class="comment-send" id="commentSend_${post.id}" onclick="addComment('${post.id}')">
                        <span class="material-symbols-outlined" style="font-size:18px">send</span>
                    </button>
                </div>
                <div id="commentsList_${post.id}">${renderCommentsHTML(myComments)}</div>
            </div>
        </article>`;
    }
    feed.innerHTML=html;
}

function renderCommentsHTML(comments){
    if(comments.length===0)return'<p style="font-size:11px;color:var(--text-muted);text-align:center;padding:8px">لا تعليقات بعد</p>';
    return comments.slice(0,5).map(c=>{
        const avatar=c.authorId===CURRENT_USER.id?CURRENT_USER.avatar:'https://i.pravatar.cc/80?u='+c.authorId;
        const name=c.authorId===CURRENT_USER.id?CURRENT_USER.name:'مستخدم';
        return '<div class="comment-item"><img src="'+avatar+'" alt=""/><div class="comment-bubble"><span class="comment-name">'+esc(name)+'</span><p class="comment-text">'+esc(c.text)+'</p><span class="comment-time">'+timeAgo(c.createdAt)+'</span></div></div>';
    }).join('');
}

// ═══════════════════════════════════════════════
// ██  POST ACTIONS  ██
// ═══════════════════════════════════════════════
async function toggleLike(postId){
    const post=await DB.get('posts',postId);
    if(!post)return;
    post.liked=!post.liked;
    post.likes+=post.liked?1:-1;
    await DB.update('posts',post);
    renderFeed();
}

async function toggleSave(postId){
    const post=await DB.get('posts',postId);
    if(!post)return;
    post.saved=!post.saved;
    await DB.update('posts',post);
    showToast(post.saved?'تم حفظ المنشور':'تم إلغاء الحفظ','success');
    renderFeed();
}

async function togglePin(postId){
    const post=await DB.get('posts',postId);
    if(!post)return;
    post.pinned=!post.pinned;
    await DB.update('posts',post);
    showToast(post.pinned?'تم تثبيت المنشور':'تم إلغاء التثبيت','info');
    renderFeed();
}

async function deletePost(postId){
    if(!confirm('هل أنت متأكد من حذف هذا المنشور؟'))return;
    await DB.remove('posts',postId);
    // حذف التعليقات المرتبطة
    const comments=await DB.getAll('comments');
    for(const c of comments){if(c.postId===postId)await DB.remove('comments',c.id)}
    showToast('تم حذف المنشور','info');
    renderFeed();
}

async function sharePost(postId){
    const post=await DB.get('posts',postId);
    if(!post)return;
    post.shares=(post.shares||0)+1;
    await DB.update('posts',post);
    if(navigator.share){
        try{await navigator.share({title:'لو بوك',text:post.text.substring(0,100),url:window.location.href})}catch(e){}
    }else{
        navigator.clipboard?.writeText(window.location.href);
        showToast('تم نسخ الرابط','success');
    }
    renderFeed();
}

function toggleComments(postId){
    const section=document.getElementById('comments_'+postId);
    if(!section)return;
    section.classList.toggle('open');
    if(section.classList.contains('open')){
        document.getElementById('commentInput_'+postId)?.focus();
    }
}

function toggleSendBtn(postId){
    const input=document.getElementById('commentInput_'+postId);
    const btn=document.getElementById('commentSend_'+postId);
    if(input&&btn)btn.classList.toggle('active',input.value.trim().length>0);
}

async function addComment(postId){
    const input=document.getElementById('commentInput_'+postId);
    if(!input||!input.value.trim())return;
    await DB.add('comments',{postId,authorId:CURRENT_USER.id,text:input.value.trim()});
    input.value='';
    toggleSendBtn(postId);
    showToast('تمت إضافة التعليق','success');
    renderFeed();
}

// ═══════════════════════════════════════════════
// ██  MENUS  ██
// ═══════════════════════════════════════════════
function toggleMenu(postId){
    closeMenus();
    const menu=document.getElementById('menu_'+postId);
    if(menu)menu.classList.toggle('open');
}
function closeMenus(){document.querySelectorAll('.more-menu.open').forEach(m=>m.classList.remove('open'))}
document.addEventListener('click',e=>{if(!e.target.closest('.post-more')&&!e.target.closest('.more-menu'))closeMenus()});

// ═══════════════════════════════════════════════
// ██  CREATE POST  ██
// ═══════════════════════════════════════════════
let selectedImage=null;

function getPollBuilder(){return document.getElementById('pollBuilder')}
function getPollOptionsWrap(){return document.getElementById('pollOptions')}
function getPollOptionValues(){return [...getPollOptionsWrap().querySelectorAll('input')].map(i=>i.value.trim()).filter(Boolean)}
function addPollOption(value=''){
    const wrap=getPollOptionsWrap();
    if(wrap.querySelectorAll('input').length>=4){showToast('الحد الأقصى 4 خيارات','info');return}
    const input=document.createElement('input');
    input.className='poll-input';
    input.type='text';
    input.placeholder='خيار إضافي';
    input.value=value;
    input.oninput=()=>updateCharCount();
    wrap.appendChild(input);
    input.focus();
    updateCharCount();
}
function resetPollBuilder(){
    const wrap=getPollOptionsWrap();
    wrap.innerHTML='';
    ['الخيار الأول','الخيار الثاني'].forEach(ph=>{
        const input=document.createElement('input');
        input.className='poll-input';
        input.type='text';
        input.placeholder=ph;
        input.oninput=()=>updateCharCount();
        wrap.appendChild(input);
    });
    getPollBuilder().classList.remove('open');
}
function togglePollBuilder(forceOpen=false){
    const builder=getPollBuilder();
    const shouldOpen=forceOpen||!builder.classList.contains('open');
    builder.classList.toggle('open',shouldOpen);
    updateCharCount();
}
function openCreateModal(mode='text'){
    document.getElementById('createModal').classList.add('active');
    document.body.style.overflow='hidden';
    if(mode==='poll')togglePollBuilder(true);
    document.getElementById('createText').focus();
}
function closeCreateModal(){
    document.getElementById('createModal').classList.remove('active');
    document.body.style.overflow='';
    document.getElementById('createText').value='';
    removeSelectedImage();
    resetPollBuilder();
    updateCharCount();
}
function updateCharCount(){
    const text=document.getElementById('createText').value;
    const count=document.getElementById('charCount');
    const btn=document.getElementById('postSubmit');
    const len=text.length;
    const hasPoll=getPollBuilder().classList.contains('open')&&getPollOptionValues().length>=2;
    count.textContent=len+' / 500';
    count.className='char-count'+(len>450?len>500?' over':' warn':'');
    btn.disabled=len===0&&!selectedImage&&!hasPoll;
}
function handleImageSelect(file){
    if(!file)return;
    const reader=new FileReader();
    reader.onload=e=>{
        selectedImage=e.target.result;
        document.getElementById('imagePreview').src=selectedImage;
        document.getElementById('imagePreviewArea').style.display='block';
        updateCharCount();
    };
    reader.readAsDataURL(file);
}
function removeSelectedImage(){
    selectedImage=null;
    document.getElementById('imagePreviewArea').style.display='none';
    document.getElementById('imageInput').value='';
    updateCharCount();
}
function renderPollHTML(post){
    if(!post.poll)return'';
    const selected=post.poll.votedBy?.[CURRENT_USER.id]||null;
    return `<div class="poll-card"><div class="poll-title"><span class="material-symbols-outlined" style="font-size:18px;color:var(--accent)">bar_chart</span><span>${esc(post.poll.question||'استطلاع')}</span></div>${post.poll.options.map(opt=>{const pct=post.poll.totalVotes?Math.round((opt.votes/post.poll.totalVotes)*100):0;const isSelected=selected===opt.id;return `<button class="poll-option-btn ${isSelected?'selected':''}" ${selected?'disabled':''} onclick="votePoll('${post.id}','${opt.id}')"><span class="poll-option-fill" style="width:${selected?pct:0}%"></span><span class="poll-option-content">${esc(opt.text)}</span><span class="poll-option-meta">${selected?pct+'%':''}</span></button>`}).join('')}<div class="poll-meta">${post.poll.totalVotes||0} صوت</div></div>`;
}
async function votePoll(postId,optId){
    const post=await DB.get('posts',postId);
    if(!post?.poll)return;
    post.poll.votedBy=post.poll.votedBy||{};
    if(post.poll.votedBy[CURRENT_USER.id]){showToast('تم التصويت مسبقاً','info');return}
    const option=post.poll.options.find(opt=>opt.id===optId);
    if(!option)return;
    option.votes=(option.votes||0)+1;
    post.poll.totalVotes=(post.poll.totalVotes||0)+1;
    post.poll.votedBy[CURRENT_USER.id]=optId;
    await DB.update('posts',post);
    showToast('تم تسجيل صوتك','success');
    renderFeed();
}
async function submitPost(){
    const text=document.getElementById('createText').value.trim();
    const pollEnabled=getPollBuilder().classList.contains('open');
    const options=getPollOptionValues();
    if(!text&&!selectedImage&&!pollEnabled)return;
    if(pollEnabled&&options.length<2){showToast('أضف خيارين على الأقل للاستطلاع','error');return}
    const post={
        authorId:CURRENT_USER.id,
        text:text,
        image:selectedImage,
        poll:pollEnabled?{question:text||'استطلاع قانوني سريع',options:options.map((value,index)=>({id:'opt_'+(index+1),text:value,votes:0})),totalVotes:0,votedBy:{}}:null,
        likes:0,comments:0,shares:0,
        saved:false,liked:false,pinned:false
    };
    await DB.add('posts',post);
    closeCreateModal();
    showToast(post.poll?'تم نشر الاستطلاع!':'تم نشر المنشور!','success');
    renderFeed();
}
