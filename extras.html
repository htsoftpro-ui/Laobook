    <style>

        @keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

<body>
<div class="bg-main"></div>
<div id="toastEl" class="toast"></div>

<header class="fixed top-0 w-full z-50 h-14 flex items-center px-4" style="background:rgba(10,10,10,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)">

        <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background:linear-gradient(135deg,var(--accent),#d4561a)">
            <span class="material-symbols-outlined text-white text-[18px]" style="font-variation-settings:'FILL' 1">storage</span>
        </div>
        <h1 class="text-base font-extrabold" style="color:var(--accent)">وحدة الباكند المحلي</h1>
    </div>
    <span class="badge badge-green mr-auto">يعمل بدون سيرفر</span>

<main class="relative z-10 pt-16 pb-8 max-w-3xl mx-auto px-4">
    <!-- Tabs -->
    <div class="tabs mb-5 a-fade">
        <button class="tab active" onclick="switchTab('storage',this)"><span class="material-symbols-outlined text-[15px]">database</span>التخزين الدائم</button>

<script>
// ═══════════════════════════════════════════════════════════════
// ██  1. IndexedDB — التخزين الدائم  ██
// ═══════════════════════════════════════════════════════════════
const LobukDB = {
    _dbName: 'LobukDatabase',
    _version: 1,
    _db: null,

    /**
     * فتح/إنشاء قاعدة البيانات
     * IndexedDB لا يُمحى عند مسح localStorage
     * يتحمل حتى 500MB+ من البيانات
     */
    async init(){
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(this._dbName, this._version);

            request.onupgradeneeded = (e) => {
                const db = e.target.result;

                // إنشاء مخازن البيانات (Object Stores)
                if(!db.objectStoreNames.contains('users')){
                    const usersStore = db.createObjectStore('users', {keyPath:'id'});
                    usersStore.createIndex('username', 'username', {unique:true});
                    usersStore.createIndex('email', 'email', {unique:true});
                }
                if(!db.objectStoreNames.contains('posts')){
                    const postsStore = db.createObjectStore('posts', {keyPath:'id', autoIncrement:true});
                    postsStore.createIndex('authorId', 'authorId');
                    postsStore.createIndex('createdAt', 'createdAt');
                }
                if(!db.objectStoreNames.contains('comments')){
                    db.createObjectStore('comments', {keyPath:'id', autoIncrement:true});
                }
                if(!db.objectStoreNames.contains('messages')){
                    db.createObjectStore('messages', {keyPath:'id', autoIncrement:true});
                }
                if(!db.objectStoreNames.contains('files')){
                    // تخزين الملفات المرفوعة (صور/فيديو)
                    db.createObjectStore('files', {keyPath:'id'});
                }
                if(!db.objectStoreNames.contains('conversations')){
                    db.createObjectStore('conversations', {keyPath:'id'});
                }
                if(!db.objectStoreNames.contains('notifications')){
                    db.createObjectStore('notifications', {keyPath:'id', autoIncrement:true});
                }
                if(!db.objectStoreNames.contains('settings')){
                    db.createObjectStore('settings', {keyPath:'key'});
                }
                console.log('[IndexedDB] تم إنشاء/تحديث قاعدة البيانات');
            };

            request.onsuccess = (e) => {
                this._db = e.target.result;
                console.log('[IndexedDB] ✅ تم فتح قاعدة البيانات بنجاح');
                resolve(this._db);
            };

            request.onerror = (e) => {
                console.error('[IndexedDB] ❌ خطأ:', e.target.error);
                reject(e.target.error);
            };
        });
    },

    /**
     * إضافة عنصر إلى مخزن معين
     */
    async add(storeName, data){
        return new Promise((resolve, reject) => {
            try{
                const tx = this._db.transaction(storeName, 'readwrite');
                const store = tx.objectStore(storeName);
                if(!data.id) data.id = 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2,6);
                if(!data.createdAt) data.createdAt = new Date().toISOString();
                const request = store.add(data);
                request.onsuccess = () => { console.log(`[DB] تمت الإضافة → ${storeName}`); resolve(data); };
                request.onerror = (e) => { console.error('[DB] خطأ إضافة:', e.target.error); reject(e.target.error); };
            }catch(e){ reject(e); }
        });
    },

    /**
     * قراءة عنصر بالمفتاح
     */
    async get(storeName, key){
        return new Promise((resolve, reject) => {
            try{
                const tx = this._db.transaction(storeName, 'readonly');
                const request = tx.objectStore(storeName).get(key);
                request.onsuccess = () => resolve(request.result || null);
                request.onerror = (e) => reject(e.target.error);
            }catch(e){ reject(e); }
        });
    },

    /**
     * قراءة كل العناصر
     */
    async getAll(storeName){
        return new Promise((resolve, reject) => {
            try{
                const tx = this._db.transaction(storeName, 'readonly');
                const request = tx.objectStore(storeName).getAll();
                request.onsuccess = () => resolve(request.result || []);
                request.onerror = (e) => reject(e.target.error);
            }catch(e){ reject(e); }
        });
    },

    /**
     * تحديث عنصر
     */
    async update(storeName, data){
        return new Promise((resolve, reject) => {
            try{
                const tx = this._db.transaction(storeName, 'readwrite');
                data.updatedAt = new Date().toISOString();
                const request = tx.objectStore(storeName).put(data);
                request.onsuccess = () => { console.log(`[DB] تم التحديث → ${storeName}`); resolve(data); };
                request.onerror = (e) => reject(e.target.error);
            }catch(e){ reject(e); }
        });
    },

    /**
     * حذف عنصر بالمفتاح
     */
    async remove(storeName, key){
        return new Promise((resolve, reject) => {
            try{
                const tx = this._db.transaction(storeName, 'readwrite');
                const request = tx.objectStore(storeName).delete(key);
                request.onsuccess = () => { console.log(`[DB] تم الحذف ← ${storeName}/${key}`); resolve(true); };
                request.onerror = (e) => reject(e.target.error);
            }catch(e){ reject(e); }
        });
    },

    /**
     * حذف كل البيانات في مخزن
     */
    async clear(storeName){
        return new Promise((resolve, reject) => {
            try{
                const tx = this._db.transaction(storeName, 'readwrite');
                const request = tx.objectStore(storeName).clear();
                request.onsuccess = () => resolve(true);
                request.onerror = (e) => reject(e.target.error);
            }catch(e){ reject(e); }
        });
    },

    /**
     * حذف قاعدة البيانات بالكامل (حذف الحساب)
     */
    async deleteDatabase(){
        this._db?.close();
        return new Promise((resolve, reject) => {
            const request = indexedDB.deleteDatabase(this._dbName);
            request.onsuccess = () => { console.log('[IndexedDB] 🗑️ تم حذف قاعدة البيانات بالكامل'); resolve(true); };
            request.onerror = (e) => reject(e.target.error);
            request.onblocked = () => reject(new Error('الحذف محظور — أغلق جميع التبويبات'));
        });
    },

    /**
     * حجم البيانات المخزنة (تقريبي)
     */
    async getStorageEstimate(){
        if(navigator.storage && navigator.storage.estimate){
            const est = await navigator.storage.estimate();
            return {used: est.usage || 0, quota: est.quota || 0, pct: Math.round((est.usage/est.quota)*100)};
        }
        return {used:0, quota:0, pct:0};
    }
};

// ═══════════════════════════════════════════════════════════════
// ██  2. File Upload — رفع الملفات الحقيقي  ██
// ═══════════════════════════════════════════════════════════════
const LobukFiles = {
    _maxImageSize: 5 * 1024 * 1024,   // 5MB
    _maxVideoSize: 50 * 1024 * 1024,  // 50MB
    _allowedImageTypes: ['image/jpeg','image/png','image/gif','image/webp'],
    _allowedVideoTypes: ['video/mp4','video/webm','video/ogg'],

    /**
     * معالجة ملف مُختار
     * يقرأ الملف باستخدام FileReader ويُرجعه كـDataURL
     */
    async processFile(file){
        // التحقق من النوع
        const isImage = this._allowedImageTypes.includes(file.type);
        const isVideo = this._allowedVideoTypes.includes(file.type);

        if(!isImage && !isVideo){
            throw new Error('نوع الملف غير مدعوم: ' + file.type);
        }

        // التحقق من الحجم
        if(isImage && file.size > this._maxImageSize){
            throw new Error('حجم الصورة يتجاوز 5MB ('+this.formatSize(file.size)+')');
        }
        if(isVideo && file.size > this._maxVideoSize){
            throw new Error('حجم الفيديو يتجاوز 50MB ('+this.formatSize(file.size)+')');
        }

        // قراءة الملف كـ DataURL (يُخزّن في IndexedDB)
        const dataUrl = await this.readAsDataURL(file);

        // إنشاء Blob URL للعرض السريع (لا يُخزّن — يختفي عند تحديث الصفحة)
        const blobUrl = URL.createObjectURL(file);

        return {
            id: 'file_' + Date.now() + '_' + Math.random().toString(36).substr(2,6),
            name: file.name,
            type: file.type,
            size: file.size,
            isImage,
            isVideo,
            dataUrl,   // دائم — يُخزّن في IndexedDB
            blobUrl,   // سريع — للعرض الفوري
            createdAt: new Date().toISOString()
        };
    },

    /**
     * قراءة ملف كـ DataURL
     */
    readAsDataURL(file){
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = () => reject(new Error('فشل قراءة الملف'));
            reader.readAsDataURL(file);
        });
    },

    /**
     * حفظ ملف في IndexedDB
     */
    async saveFile(fileData){
        await LobukDB.add('files', fileData);
        console.log('[Files] ✅ تم حفظ: ' + fileData.name + ' (' + this.formatSize(fileData.size) + ')');
        return fileData;
    },

    /**
     * جلب كل الملفات
     */
    async getAllFiles(){
        return await LobukDB.getAll('files');
    },

    /**
     * حذف ملف
     */
    async deleteFile(fileId){
        await LobukDB.remove('files', fileId);
        console.log('[Files] 🗑️ تم حذف الملف: ' + fileId);
    },

    /**
     * ضغط الصورة (اختياري — يُقلل الحجم)
     */
    async compressImage(dataUrl, maxWidth=1200, quality=0.8){
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let w = img.width, h = img.height;
                if(w > maxWidth){ h = (h * maxWidth) / w; w = maxWidth; }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                resolve(canvas.toDataURL('image/jpeg', quality));
            };
            img.src = dataUrl;
        });
    },

    formatSize(bytes){
        if(bytes < 1024) return bytes + ' B';
        if(bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
        return (bytes/(1024*1024)).toFixed(1) + ' MB';
    }
};

// ═══════════════════════════════════════════════════════════════
// ██  3. Password Hashing — Web Crypto API  ██
// ═══════════════════════════════════════════════════════════════
const LobukAuth = {
    /**
     * تشفير كلمة المرور بـ SHA-256
     * في المتصفح فقط — الإنتاج يستخدم bcrypt في الباك إند
     */
    async hashPassword(password){
        const encoder = new TextEncoder();
        const data = encoder.encode(password + 'lobuk_salt_2025');
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2,'0')).join('');
    },

    /**
     * التحقق من كلمة المرور
     */
    async verifyPassword(password, storedHash){
        const hash = await this.hashPassword(password);
        return hash === storedHash;
    },

    /**
     * فحص قوة كلمة المرور
     */
    checkStrength(password){
        const checks = {
            length: password.length >= 8,
            upper: /[A-Z]/.test(password),
            lower: /[a-z]/.test(password),
            digit: /[0-9]/.test(password),
            special: /[^A-Za-z0-9]/.test(password),
        };
        const score = Object.values(checks).filter(Boolean).length;
        const labels = ['ضعيف جداً','ضعيف','مقبول','جيد','قوي','قوي جداً'];
        const colors = ['#ef4444','#ef4444','#eab308','#3b82f6','#22c55e','#22c55e'];
        return {checks, score, maxScore:5, label:labels[score], color:colors[score], pct:Math.round(score/5*100)};
    },

    /**
     * تسجيل مستخدم جديد مع تشفير كلمة المرور
     */
    async register(username, email, password){
        // تشفير كلمة المرور
        const hashedPw = await this.hashPassword(password);

        // إنشاء المستخدم
        const user = {
            id: 'user_' + Date.now(),
            username,
            email,
            passwordHash: hashedPw,  // ← لا يُخزّن كنص صريح!
            name: username,
            avatar: 'https://i.pravatar.cc/80?u=' + username,
            bio: '',
            verified: false,
            role: 'user',
            createdAt: new Date().toISOString()
        };

        await LobukDB.add('users', user);
        console.log('[Auth] ✅ تسجيل جديد: ' + username + ' (كلمة المرور مشفّرة)');
        return user;
    },

    /**
     * تسجيل الدخول
     */
    async login(usernameOrEmail, password){
        const users = await LobukDB.getAll('users');
        const user = users.find(u => u.username === usernameOrEmail || u.email === usernameOrEmail);
        if(!user) throw new Error('المستخدم غير موجود');

        const valid = await this.verifyPassword(password, user.passwordHash);
        if(!valid) throw new Error('كلمة المرور خاطئة');

        // حفظ الجلسة
        const session = {userId:user.id, username:user.username, role:user.role, loginAt:new Date().toISOString()};
        localStorage.setItem('lobuk_session', JSON.stringify(session));
        console.log('[Auth] ✅ دخول ناجح: ' + user.username);
        return user;
    },

    /**
     * تحديث كلمة المرور (حقيقي — يُحدّث الهاش في IndexedDB)
     */
    async changePassword(userId, oldPassword, newPassword){
        const user = await LobukDB.get('users', userId);
        if(!user) throw new Error('المستخدم غير موجود');

        // التحقق من القديمة
        const valid = await this.verifyPassword(oldPassword, user.passwordHash);
        if(!valid) throw new Error('كلمة المرور الحالية خاطئة');

        // تشفير الجديدة
        user.passwordHash = await this.hashPassword(newPassword);
        await LobukDB.update('users', user);

        console.log('[Auth] ✅ تم تحديث كلمة المرور (hash جديد)');
        return true;
    },

    /**
     * حذف الحساب نهائياً
     */
    async deleteAccount(userId, password){
        const user = await LobukDB.get('users', userId);
        if(!user) throw new Error('المستخدم غير موجود');

        // التحقق من كلمة المرور قبل الحذف
        const valid = await this.verifyPassword(password, user.passwordHash);
        if(!valid) throw new Error('كلمة المرور خاطئة — لا يمكن الحذف');

        // حذف كل البيانات المرتبطة
        const posts = (await LobukDB.getAll('posts')).filter(p => p.authorId === userId);
        for(const p of posts) await LobukDB.remove('posts', p.id);

        const comments = (await LobukDB.getAll('comments')).filter(c => c.authorId === userId);
        for(const c of comments) await LobukDB.remove('comments', c.id);

        // حذف الملفات المرفوعة
        const files = (await LobukDB.getAll('files')).filter(f => f.uploaderId === userId);
        for(const f of files) await LobukDB.remove('files', f.id);

        // حذف المستخدم نفسه
        await LobukDB.remove('users', userId);

        // مسح الجلسة
        localStorage.removeItem('lobuk_session');

        console.log('[Auth] 🗑️ تم حذف الحساب وجميع البيانات المرتبطة');
        return true;
    },

    /**
     * الحصول على المستخدم الحالي
     */
    async getCurrentUser(){
        const session = JSON.parse(localStorage.getItem('lobuk_session') || 'null');
        if(!session) return null;
        return await LobukDB.get('users', session.userId);
    },

    /**
     * تسجيل الخروج
     */
    logout(){
        localStorage.removeItem('lobuk_session');
        console.log('[Auth] 👋 تسجيل خروج');
    }
};

const Logger = {
    _lines: [],
    log(type, msg, detail=''){
        const time = new Date().toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
        this._lines.unshift({time, type, msg, detail});
        this.render();
    },
    render(){
        const el = document.getElementById('consoleOutput');
        if(!el) return;
        const colors = {success:'text-green-400 bg-green-500/10',error:'text-red-400 bg-red-500/10',info:'text-blue-400 bg-blue-500/10',warn:'text-yellow-400 bg-yellow-500/10',data:'text-purple-400 bg-purple-500/10'};
        el.innerHTML = this._lines.slice(0,30).map(l=>`<div class="console-line"><span style="color:#4a4a4a;flex-shrink:0">${l.time}</span><span class="${colors[l.type]||''}" style="font-weight:700;padding:0 4px;border-radius:3px;font-size:10px;flex-shrink:0">${l.type.toUpperCase()}</span><span style="color:#a3a3a3;flex:1;word-break:break-all">${l.msg}</span>${l.detail?`<span style="color:#4a4a4a;font-size:10px;flex-shrink:0">${l.detail}</span>`:''}</div>`).join('');
    },
    clear(){this._lines=[];this.render();}
};

}

function render(){
    const area = document.getElementById('content');

        case 'upload': renderUpload(area); break;
        case 'video': renderVideo(area); break;

        case 'delete': renderDelete(area); break;

}

async function handleFiles(fileList){
    for(const file of fileList){
        try{
            Logger.log('data','→ معالجة: '+file.name+' ('+LobukFiles.formatSize(file.size)+')');
            const processed = await LobukFiles.processFile(file);
            uploadedFiles.push(processed);
            Logger.log('success','✓ تمت معالجة: '+file.name);
        }catch(e){
            Logger.log('error','❌ '+e.message);
            showToast(e.message,'error');
        }
    }
    renderPreviews();
}

function renderPreviews(){
    const container = document.getElementById('filePreviews');
    const actions = document.getElementById('uploadActions');
    if(!container) return;

    if(uploadedFiles.length === 0){
        container.innerHTML = '';
        if(actions) actions.style.display = 'none';
        return;
    }

    if(actions) actions.style.display = 'flex';

    container.innerHTML = uploadedFiles.map((f,i) => `
    <div class="file-preview">
        ${f.isImage ? `<img src="${f.dataUrl}" alt="${esc(f.name)}"/>` : `<video src="${f.dataUrl}" muted></video>`}
        <button class="remove-btn" onclick="removePreview(${i})">
            <span class="material-symbols-outlined text-white text-[16px]">close</span>
        </button>
        <div style="position:absolute;bottom:8px;right:8px;left:8px">
            <div class="text-[9px] font-bold truncate px-2 py-1 rounded-lg" style="background:rgba(0,0,0,.7);color:white">${esc(f.name)} • ${LobukFiles.formatSize(f.size)}</div>
        </div>
    </div>`).join('');
}

function removePreview(idx){
    uploadedFiles.splice(idx, 1);
    renderPreviews();
}

function clearPreviews(){
    uploadedFiles = [];
    renderPreviews();
}

async function saveAllFiles(){
    if(uploadedFiles.length === 0) return;
    Logger.log('info','═══ حفظ الملفات في IndexedDB ═══');

    try{
        for(const f of uploadedFiles){
            // ضغط الصور قبل الحفظ
            if(f.isImage && f.size > 1024*1024){
                Logger.log('data','→ ضغط: '+f.name);
                f.dataUrl = await LobukFiles.compressImage(f.dataUrl);
            }
            await LobukFiles.saveFile(f);
            Logger.log('success','✓ حُفظ: '+f.name);
        }

        showToast('تم حفظ '+uploadedFiles.length+' ملف في IndexedDB','success');
        uploadedFiles = [];
        renderPreviews();
        loadSavedFiles();
    }catch(e){
        Logger.log('error','❌ '+e.message);
        showToast('خطأ في الحفظ: '+e.message,'error');
    }
}

async function loadSavedFiles(){
    const container = document.getElementById('savedFiles');

function initVideoPlayer(){
    const video = document.getElementById('mainVideo');
    if(!video) return;

    video.addEventListener('timeupdate', ()=>{
        const pct = (video.currentTime / video.duration) * 100;
        const fill = document.getElementById('progressFill');
        const time = document.getElementById('videoTime');
        if(fill) fill.style.width = pct + '%';
        if(time) time.textContent = formatTime(video.currentTime) + ' / ' + formatTime(video.duration);
    });

    video.addEventListener('ended', ()=>{
        const btn = document.getElementById('playBtn');
        if(btn) btn.innerHTML = '<span class="material-symbols-outlined text-[20px]">replay</span>';
    });
}

function togglePlay(){
    const video = document.getElementById('mainVideo');
    const btn = document.getElementById('playBtn');
    if(!video) return;

    if(video.paused){
        video.play();
        btn.innerHTML = '<span class="material-symbols-outlined text-[20px]">pause</span>';
    } else {
        video.pause();
        btn.innerHTML = '<span class="material-symbols-outlined text-[20px]">play_arrow</span>';
    }
}

function seekVideo(e){
    const video = document.getElementById('mainVideo');
    const bar = document.getElementById('videoProgress');
    if(!video || !bar) return;
    const rect = bar.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    video.currentTime = pct * video.duration;
}

function toggleMute(){
    const video = document.getElementById('mainVideo');
    const btn = document.getElementById('muteBtn');
    if(!video) return;
    video.muted = !video.muted;
    btn.innerHTML = `<span class="material-symbols-outlined text-[18px]">${video.muted?'volume_off':'volume_up'}</span>`;
}

function toggleFullscreen(){
    const container = document.getElementById('videoPlayerContainer');
    if(!container) return;
    if(document.fullscreenElement) document.exitFullscreen();
    else container.requestFullscreen?.();
}

function formatTime(sec){
    if(isNaN(sec)) return '0:00';
    const m = Math.floor(sec/60);
    const s = Math.floor(sec%60);
    return m+':'+s.toString().padStart(2,'0');
}

async function loadCustomVideo(file){
    if(!file) return;
    try{
        Logger.log('data','→ معالجة الفيديو: '+file.name);
        const processed = await LobukFiles.processFile(file);

        // عرضه في المشغّل
        const video = document.getElementById('mainVideo');
        if(video){
            video.src = processed.dataUrl;
            video.load();
        }

        // حفظه
        await LobukFiles.saveFile(processed);
        Logger.log('success','✓ تم تحميل وحفظ: '+file.name);
        showToast('تم تحميل الفيديو','success');
        loadSavedVideos();
    }catch(e){
        Logger.log('error','❌ '+e.message);
        showToast(e.message,'error');
    }
}

async function loadSavedVideos(){
    const container = document.getElementById('savedVideos');
    if(!container) return;
    const files = await LobukFiles.getAllFiles();
    const videos = files.filter(f=>f.isVideo);
    if(videos.length === 0){
        container.innerHTML = '<p class="text-xs text-center py-4" style="color:var(--text-muted)">لا فيديوهات محفوظة</p>';
        return;
    }
    container.innerHTML = videos.map(v=>`
    <div class="flex items-center gap-3 p-3 rounded-xl cursor-pointer" style="background:rgba(42,42,42,.2)" onclick="playSavedVideo('${v.id}')">
        <span class="material-symbols-outlined text-red-400 text-[24px]">smart_display</span>
        <div class="flex-1"><span class="text-xs font-bold block">${esc(v.name)}</span><span class="text-[10px]" style="color:var(--text-muted)">${LobukFiles.formatSize(v.size)}</span></div>
        <button onclick="event.stopPropagation();deleteSavedFile('${v.id}');loadSavedVideos()" class="p-2 rounded-lg hover:bg-red-500/10"><span class="material-symbols-outlined text-red-400 text-[14px]">delete</span></button>
    </div>`).join('');
}

async function playSavedVideo(id){
    const file = await LobukDB.get('files', id);
    if(!file) return;
    const video = document.getElementById('mainVideo');
    if(video){
        video.src = file.dataUrl;
        video.load();
        video.play();
        const btn = document.getElementById('playBtn');
        if(btn) btn.innerHTML = '<span class="material-symbols-outlined text-[20px]">pause</span>';
    }
}

function updatePwStrength(pw){
    const s = LobukAuth.checkStrength(pw);
    const bar = document.getElementById('pwBar');
    const label = document.getElementById('pwLabel');
    if(bar){bar.style.width=s.pct+'%';bar.style.background=s.color;}
    if(label){label.textContent=pw?s.label+' ('+s.score+'/'+s.maxScore+')':'أدخل كلمة مرور';label.style.color=s.color||'var(--text-muted)';}
}

async function doRegister(){
    Logger.clear();
    const username = document.getElementById('regUser').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPw').value;

    if(!username||!email||!password){showToast('أدخل جميع الحقول','error');return}
    if(password.length<8){showToast('كلمة المرور 8 أحرف على الأقل','error');return}

    try{
        Logger.log('info','═══ تسجيل حساب جديد ═══');
        Logger.log('data','→ تشفير كلمة المرور بـ SHA-256...');
        const user = await LobukAuth.register(username, email, password);
        Logger.log('success','✓ تم التشفير','hash: '+user.passwordHash.substring(0,20)+'...');
        Logger.log('success','✓ تم إنشاء الحساب','user: '+user.username);
        Logger.log('data','→ كلمة المرور الأصلية لم تُخزّن! فقط الهاش.');
        showToast('تم إنشاء الحساب — كلمة المرور مشفّرة!','success');
        updateCurrentUserDisplay();
    }catch(e){
        Logger.log('error','❌ '+e.message);
        showToast(e.message,'error');
    }
}

async function doLogin(){
    Logger.clear();
    const user = document.getElementById('loginUser').value.trim();
    const pw = document.getElementById('loginPw').value;

    if(!user||!pw){showToast('أدخل اسم المستخدم وكلمة المرور','error');return}

    try{
        Logger.log('info','═══ تسجيل دخول ═══');
        Logger.log('data','→ التحقق من كلمة المرور...');
        const u = await LobukAuth.login(user, pw);
        Logger.log('success','✓ دخول ناجح: '+u.username);
        Logger.log('data','→ تم مقارنة SHA-256 hash — متطابق');
        showToast('مرحباً '+u.username+'!','success');

    }catch(e){
        Logger.log('error','❌ '+e.message);
        showToast(e.message,'error');
    }
}

async function doChangePassword(){
    Logger.clear();
    const oldPw = document.getElementById('oldPw').value;
    const newPw = document.getElementById('newPw').value;

    if(!oldPw||!newPw){showToast('أدخل كلمة المرور الحالية والجديدة','error');return}
    if(newPw.length<8){showToast('كلمة المرور الجديدة 8 أحرف على الأقل','error');return}

    const session = JSON.parse(localStorage.getItem('lobuk_session')||'null');
    if(!session){showToast('سجّل الدخول أولاً','error');return}

    try{
        Logger.log('info','═══ تحديث كلمة المرور ═══');
        Logger.log('data','→ التحقق من القديمة...');
        await LobukAuth.changePassword(session.userId, oldPw, newPw);
        Logger.log('success','✓ تم التحقق من القديمة');
        Logger.log('success','✓ تم تشفير الجديدة وحفظها');
        Logger.log('data','→ الهاش القديم حُذف — الهاش الجديد محفوظ');
        showToast('تم تحديث كلمة المرور!','success');
        document.getElementById('oldPw').value='';
        document.getElementById('newPw').value='';
    }catch(e){
        Logger.log('error','❌ '+e.message);
        showToast(e.message,'error');
    }
}

async function updateCurrentUserDisplay(){

async function doDeleteAccount(){
    Logger.clear();
    const pw = document.getElementById('deletePw').value;
    if(!pw){showToast('أدخل كلمة المرور','error');return}

    const session = JSON.parse(localStorage.getItem('lobuk_session')||'null');
    if(!session){showToast('سجّل الدخول أولاً','error');return}

    if(!confirm('هل أنت متأكد من حذف حسابك نهائياً؟')) return;

    try{
        Logger.log('info','═══ حذف الحساب ═══');
        Logger.log('data','→ التحقق من كلمة المرور...');
        await LobukAuth.deleteAccount(session.userId, pw);
        Logger.log('success','✓ تم التحقق — كلمة المرور صحيحة');
        Logger.log('success','✓ تم حذف المستخدم');
        Logger.log('success','✓ تم حذف جميع المنشورات والتعليقات');
        Logger.log('success','✓ تم حذف جميع الملفات المرفوعة');
        Logger.log('success','✓ تم مسح الجلسة');
        Logger.log('info','═══ 🗑️ تم حذف الحساب نهائياً ═══');
        showToast('تم حذف الحساب نهائياً','info');
    }catch(e){
        Logger.log('error','❌ '+e.message);
        showToast(e.message,'error');
    }
}

async function doNuclearDelete(){
    if(!confirm('⚠️ تحذير: سيتم حذف كل شيء!\n\nكل المستخدمين، المنشورات، الملفات...\n\nهل أنت متأكد؟')) return;
    if(!confirm('تأكيد أخير: هذا لا يمكن التراجع عنه!')) return;

    Logger.clear();
    try{
        Logger.log('warn','═══ 💣 الحذف النووي ═══');
        Logger.log('data','→ حذف قاعدة البيانات IndexedDB...');
        await LobukDB.deleteDatabase();
        Logger.log('success','✓ تم حذف قاعدة البيانات بالكامل');
        localStorage.clear();
        Logger.log('success','✓ تم مسح localStorage');
        Logger.log('info','═══ تم حذف everything ═══');
        showToast('تم حذف كل شيء — أعد تحميل الصفحة','info');

        // Re-init after 2s
        setTimeout(async()=>{
            await LobukDB.init();
            Logger.log('success','✓ تم إنشاء قاعدة بيانات جديدة فارغة');
        }, 2000);
    }catch(e){
        Logger.log('error','❌ '+e.message);
        showToast(e.message,'error');
    }
}

// ██  TOAST  ██
// ═══════════════════════════════════════════
function showToast(msg,type='info'){
    const t=document.getElementById('toastEl');
    const icons={success:'check_circle',error:'error',info:'info'};
    t.className='toast '+type;
    t.innerHTML=`<span class="material-symbols-outlined text-[18px]">${icons[type]||'info'}</span> ${msg}`;
    setTimeout(()=>t.classList.add('show'),10);
    setTimeout(()=>t.classList.remove('show'),3500);
}
